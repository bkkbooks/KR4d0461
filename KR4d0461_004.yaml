body:
  text: 畏齋集卷四元程端禮撰序送虞誠原夾浦代歸序余往年過霅舟中友朋言虞君彥髙之賢也曰彥髙教授湖學申舉胡先生法行之以誠多士悅服且示豫以所刻教法石本余謂教官不知教久矣今乃有此人邪其後聞於朋友益信每恨往來西州不得一見彥髙也去年夏歸鄞始知彥髙子誠原來官夾浦務友朋又言誠原承詩書世澤力學好修江浙人材淵藪試進士舉中次榜今不以清門自髙肯從蔭調為司征又克盡乎其職余謂晉管庫士可為大夫漢倉庫吏子孫以為氏為官擇人古之制也小大之職思不出位故能績熙民阜猶天之必積日時以成嵗功也後世之士卑小官鄙理財小人用事而民生困于是又歎誠原之賢且智彥髙之教又行于其家也誠原終更至會府來訪于余遂敘于鄞士送行詩卷云送王伯華歸永嘉序子夏教其門人灑掃應對子遊以為本之則無門人問交述子夏之云子張以為異於吾所聞三子者同師孔子而其所以為教乃不能相一所謂源逺未分不待再傳已若此然則學於兩師間而欲其教之同也難矣余與朋友讀書江東精舍李季和先生應南臺聘從其弟子來自永嘉訓升學升士從之如雲見余所以為教者曰是用朱子熟讀精思法也是吾師臨海方先生所以教吾者也即遣弟子王生卒業於余且使悉受讀書節目與説經之書余謂生之師學術過余逺甚徒以余守朱子讀法持心堅苦積嵗月以漸進者粗有以合于其心故忘其有餘在已云爾嵗暮生歸有日求贈言顧余何以朂焉昔秦王問取荆用幾何人李信曰不過二十萬王翦曰非六十萬不可王謂翦曰將軍老矣何怯也遂使信信大敗而還卒用翦計乃舉荆噫世之讀書孰不欲有成朱子法翦之言也勿謂為老而怯哉送郭芥菴歸永嘉序余讀韓退之送廖道士序愛其文詞竊惟其言衡山之南八九百里為郴郴為中州清淑之氣之所窮亦已誤矣天下山川皆自西南入中州後世地理家卜葬者所能知也退之讀禹貢乃不知之何邪至其言水土之所生神氣之所感白金水銀丹砂石英千尋之名材不能獨當必有魁奇忠信材德之士生其間惜其沒溺于老佛之學而不出者則名言也又讀沈存中筆談言永嘉鴈蕩之奇秀昔未嘗見於圗牒至宋祥符間有同入山伐木人見之而始名天下又怪以謝康樂之善遊而不之訪何邪永嘉人物周劉之學行貝薛之經術陳葉之文華王龜齡之志節正大光明又皆生于山川得名之後何邪蜀之山川奇矣亦自漢通中州浹文翁之化長卿東受七經淵雲以文學名豈山川之靈亦有待於世之知之而後生人材邪然則今世豈曰無人抑退之所謂沒溺而不出者是歟余少有志于遊今老矣蟄伏林下四方竒士之至未有不得與之交交焉未有不得問其山川之勝也去年冬永嘉芥菴郭君來鄞服道士服絶利一源為長生久視之學且讀書多藝能善卜葬余因知為永嘉魁竒之士矣余友劉仲愚買山葬其親甲可乙否久不得葬君與之定穴衆咸服余方欲與之劇論而君行矣永嘉王伯華嘗從余讀書江東精舍又皆君之所與遊且肯言其鄉之賢豪甚悉過廖師之訪其所與遊而不以告者逺矣余因書以送之送牟景陽都事浙東代歸序余讀陵陽牟景陽大父清忠公奏議未嘗不嘆蜀人之文之美至于斯也蓋蜀自漢已能以文擅天下司馬王揚闓其端一變于蘇氏再變于魏文靖公文靖學程朱學碩大光明掩前聞人清忠則學于文靖者也又能以其踐諸躬者格其君自朝廷宫掖賄相權姦宦官宫妾言人之所不能與所不敢其君不改不止也故終理宗世宋能以危為安且未嘗髙談性命而略事功未嘗有意為文人之文而文特妙所謂蜀文變而益美者歟此有志之士願為執鞭而不可得者歟余大父常熟府君嘗受知清忠以余之生晚得拜景陽父大理公于霅交兄成甫于溧今又得交景陽焉其學一再傳而益粹著述行學者蒞官行已具有本末二百年文獻之族孰與為比景陽都事浙東宣慰元帥府人皆知其器識髙逺遇事立剖治法兵謀風行霆流恩淪威懾厥績大著而豈知其本之家學者蓋如此也昔大理以不能媚權臣久歷外服嘗治浙東獄德在人心今景陽又歷此凡六年其去也益重浙士之思咸為歌詩以頌其美而余因序其文獻為世欣慕逺有所自著于卷首送貢有源歸宣城序奉化蔣申之致其鄉長老之請曰久矣吾州之學廢教弛也自貢君有源之來一新黌宇教養具舉惠我多士迫于代去矢于詩歌以寫我思惟先生嘗記其修學矣願書一言于卷首焉余謂諸君知有源初試為學官已能為人所難能故諸君服其才德其惠矣豈知其宦業之講於家庭者有素不待蒞其職當其事而後能也蓋自其曽大父祕書大監南漪公積德肇慶一傳已能以文學顯監學直翰林再傳而仕內外服知名于一時者幾十人今有源兄弟又駸駸仕路且未嘗以門地自矜而德義是尚貢氏之興殆未易量于是乎益信南漪公積德之厚也有源抱利器膺顯擢行濟物之志有曰安知不再蒞吾郡以惠諸君耶易曰有孚惠心勿問元吉使有源果有孚以惠于諸君之心勿問而元吉可知矣申之曰唯唯遂書以為序送婁行所歸吉安序古者學制于二十五家之閭節目獨詳庠序云者以時屬民之所也蓋去民愈近而施教愈密州長屬民讀法嵗不過四下之黨正七族師十有四而閭胥則無時矣以此知民常在孰而時會于序非如後世違親越鄉羣居族食比閭無以考其行州黨無以施其教也自學制田制壞士貧始出農工商賈下窮鄉晚學無書可讀無師可親故子遊自吳北學相如東受七經退之讀書江南士之有志者其勢不得不遊且學也雖然士幸生今日又與前日異者程子朱子出而四書六經之道大明其書布天下在杜門下帷取其書熟讀精思反身而誠焉耳此豈求有弗得而待于遊使其家衣食粗給生讀書之鄉有父兄師友可資非有甚不得已又何必曠定省費曰力以冒道塗風塵之勞吉安婁行所倦遊將歸出其師草廬吳先生逰説示余且徵余言草廬已言為之盡顧余何言行所力學能文生讀書之鄉家世簮組詩書之澤甚深設有孰非有不得已而出今其歸也豈不為計之得因陳古制實草廬之説以塞請送劉宗道歸夷門序自昔田制學制壞士始貧出農工商賈下違親越鄉比閭無所考其行州黨無以施其教雖有志者亦不得不遊且學也以有志者少遊而不學也凡曰遊學云者俗例厭之噫子遊自吳北學長卿東受七經退之讀書江南遊學可少乎哉夷門劉宗道奉親命遊學江南肄業明道精舍有年今其歸升士喜其立志不渝能力學以歸慰其親嵗適大比又將與其鄉賢能之興咸為歌詩以餞且求贈言于余余謂凡宗道學馬而得者皆足以自朂奚俟余言竊以為自朱子集諸儒之成講學之方悉有定論儻歸取其書熟讀而精思之於窮理反身兼致其力而見於事親從兄之實此豈求有弗得而待于遊邪宗道志于學者故以告焉而書以為别送王副使序至元三年春中順大夫浙東道宣慰副使僉元帥府事鄆城王公得代且行七路士民依戀攀卧如去父母既為詩頌公之美又兼屬筆於廬江况君肩吾立去思之碑惟慶元為治所得於觀感尤詳竊謂公之得民豈有他道哉亦惟實德素修其為政皆德之所形故風行霆流善彰惡疸潛遷陰改不待見於聲色而能培長治之基消未萌之姦其有功甚大此豈可與文法吏較簿書期會以為得失者同日語至若公之平反寃獄化旱為霖終始廉介貴而能貧犀珠磊落一不動心他人能是以為奇在公特為實德中之一二事耳原其所自蓋公母太原郡君馬氏守共薑之節敦孟母之教兄弟篤于孝友一門盛烈朝廷旌異外所共聞故其所至未施政而人化服效宜然也昔君陳之尹東郊以孝友而施政畢公懋德而正色率下世言古今人不相及觀公之政果不相及乎哉鄉校士歌頌之而程端禮為之序送朵郎中使還序天子既立左右丞相更新國政乃五月二十二日出詔書布告天下以江南三省之久勞於兵也遣使者六人往諭德意於是朵君仲容自翰林待制擢兵部郎中余以南臺監察御史備員禮部員外郎承命如江浙海道取疾帆風一日夜踔數百干里既至丞相大夫兩府百執事有司黎庶莫不鼓舞歡呼奔走聽詔北望稽首沐浴聖德以為使者自天而下且謂天子遣曺官來至重不與他使等禮遇殊厚朵君國族也家世簮纓為辛卯進士第一人年少而間於禮和順謙恭以正進退應對始終無違者贈賄悉讓不受余雖欲出意見補闕漏而卒莫得其間焉束手仰成徼光叨榮而已既而與君詣四明奉御香于天妃祠是時省臣有治兵海上者遂繇四明趨奉化過海寧入天台抵黃岩之南監致錫賚退觀朱文公石閘望桐柏宫沿剡溪循謝太傅東山上會稽浮鏡水而回皆山行滯雨余疾作卧越郊之僧舍而君入杭矣君之先君子嘗為黃岩州監起為御史今所過父老有識之者曰此吾邑賢大夫之子也門人故吏迎拜曰我公御史之英嗣也縉紳先生相謂曰今天子之門生狀元郎也君未嘗以名位臨人其見重稱譽如此夫國家興科舉以羅天下之賢俊政欲與共天祿治天職也唯蒙古生得為狀元尊國人也然自有科第來求其傑然不負所學任致君澤民之責而無愧者蓋不多見豈富貴之移人耶抑明經僅足以取青紫而已耶袪世俗之末習邁古人之髙躅建勳業於不朽垂聲名於無窮吾於朵君有望矣朵君之還朝也余卧病不能從於其别也敘以識之雖然余老矣東南生民塗炭已極君歸謁丞相政有所當施事有所宜行賢才有所必舉幸為我悉陳之哉至正十八年嵗在戊戌四月甲申序送浙東帥掾朱子中考滿序余謂古之為士自起居飲食仰事俯育無事而非學至於禮樂刑政甲兵錢穀亦無學而非事故其為吏也入治出長用咸宜之而真儒之效始白後世三物之教不明士始離事以為學浮華苟偽成俗而士少可任之材然士生今日能知明體適用任之以事而事治者可不謂之賢乎哉余至元五年教鉛山朋友之來自閩者能言朱君子中才美時閩冦發張甚至調官軍逾年尚稽伏誅閩帥旺扎勒公選君從軍犯煙瘴冒矢石晝夜治文書凡兵謀將略君䇿居多既勦除幕府上功列薦臺省遷調浙東帥閫余始識君儒雅廉靜日讀書事至而應無不曲當倭商久不至去年文舟入定海元帥米公廉明公正有才略不輕許可統軍鎮遏獨選君以行懲曩年以金珠磊落官吏受啖致激事變盡革其弊一新禁令令行禁止交易流通百姓晏然仁孚威懾島夷悅服深得柔逺之體亦多自君發之君名實益孚方專委任而考滿得代矣七郡咸惜其去鄞士尤不忍别為歌詩以送余見世之論者多有取於倪寬以儒飾吏事之説余獨曰未也當曰以儒術行吏事不當曰飾也飾文飾之也若曰飾吏事則以張湯之深文已能取博士弟子員為廷尉獄吏矣奚俟于寬嗚呼此獨未免以儒者章句為文法之助也余因觀子中之行事當理而知其平日非離事以為學也故喜而為之敘送教授鄭君景尹赴浮梁任序余與景尹居甬東為同里先人迎師訓不肖兄弟景尹就學于余孰為同門情相好為同志後景尹遷故相城居里居始異景尹師樗園劉公友伯長袁公篤意種學織文聲聞日起余兄弟則師果齋史先生學不加進而師友始異久之景尹與余教江左學校出處又同景尹能刋紫陽精舍朱子所著諸書板以永理學之傳力復朱子祖墓宅里之侵於豪民二十年子孫不能復者表章祠祀以正後學之嚮望與余之區區所至用心教養教必以朱子讀法讀朱子所釋之經養必復田租使來學之士晝夜得以誦習如歸者其為職業又同也景尹生與余弟時叔同年余七年以長自鉛學以早衰謝事歸至正元年明守真定王居敬選訓導余力辭其聘不可與景尹同入齋同守朱子讀法六條以刋定日程督諸生學咸知自奮四書五經傳注通念曉析明之學校方有教養之實余以衰病辭去凡余所教諸子不屑從他師盡歸景尹卒業今年景尹又以教浮梁去諸生不屑從他師至於痛哭而散記曰一年視離經辨志嗚呼學者志立然後見讀經之效朱子讀法豈欺我哉余為之慨嘆不能自己嗚呼學校不得師久矣景尹之去此為可惜彼之得則可賀也景尹之教其州必自慎選訓導之能用朱子讀法者始豈待贅一辭余延祐間嘗教池之建德與浮梁壤地相接時則有知州文卿郭公興學能聘吳方二先生訓諸生自此人才輩出建德則余方教洪允文馮勉汪增汪培輩也兩地絃誦之聲相聞亦一時之盛哉俯仰二十年士風豈能頓衰在作興者何如耳故因其行敘余與景尹出處職業之同者以贈送自怡公序餘干監州台巴哈哈公行有日浙東帥閫長二􅒼屬郡縣守令與凡交遊之士集送為歌詩以餞程端禮舉酒為夀言曰昔李文饒以唐相子謂朝廷顯官須公卿子弟輩為之蓋以少習其業目熟其事臺閣之儀不教而成寒士縱有出羣之材終有不能嫺習也或者疑其言以家自矜余因觀公而信其為確論也公自其父鞏國武惠公於至元十三年江南初歸版圗慶元為沿海重鎮為招討元帥宣慰以人之安公也增秩留鎮慶元幾三十年仁孚列郡威讋九夷功在國史而公早年以明威將軍佩虎符繼為沿海萬户有年既以才略自見家聲益振一旦以官讓其兄子而歸讀書月湖之上扁其室曰自怡日延名儒討論修已治人古今得失小而篇章亦與寒士爭工朝廷徵參太尉府軍事方流聲實于中外乃一麾出守餘干兹非所謂少習其業目熟其事嫺習其儀者歟今公之往也帥閫之咨邉徼者孰與言山川之險要守令之咨撫字者孰與言田里之休戚鄉先生孰載酒而禮於其廬晚進之士孰訓飭以宦學事師之禮故惜其别嘆此之失而賀彼之得也客有阮受益曰韓子云譬之水其為澤不為川乎天將雨水氣上無擇於川澤澤之道其亦有施乎今子之惜别私言也既不能止公之為澤而不為川矣澤之施而為雨能止其不及我乎衆曰然送馮彥思序余自早年受學於甬東果齋史先生授朱子讀書法六條所謂居敬持志循序漸進熟讀精思虛心涵泳切已體察著緊用力者才識雖陋粗知兢兢固守而不敢廢其一皇慶間教池之建德學諸生洪允文汪務能輩從學者四十餘人有馮彥思年甚少資敏而志篤諸生之務求實益者未之能先也越二年改元延祐而設科取士之制行喜與余之所教明經作義之法大略相同蓋科舉取貢舉私議漢左雄明經守家法之説某經主某説兼用古注疏作義不拘格律條舉所主所用之説發明其於經旨之得失而論繼之也將代余首遵科制參朱子讀書法以其先後本末節目分之以年程之以日悉著於編以為學校教法藏於六經閣彥思曰勉敢不確守繼而彥思訓導於學余時長江東書院彥思常以文字往來也彥思尋中江浙鄉試冠左榜擢第南歸録事常州以廉慎不欺為主時水旱相繼凡賑濟檢踏彥思户至畝履躬任其勞凡久宦者皆笑其拙至風憲覆實獨舉彥思最他有司受成于吏胥以贓敗者十罷去七八又以所刋教法訓諸生故凡登彥思之門者知根本是務余聞而喜之彥思遷他官名實益昭余自延祐三年别彥思至今二十有九年不得再見書問往來常以不得會為恨其後聞彥思門人卨哲臺舜臣鄉試中江浙冠右榜是年科舉罷不得會試舜臣侍父官慈溪與其友欣都舜俞來訪余於甬東林廬余觀舜臣信道篤不以科舉罷而一日廢學舜俞共學勤苦嚴利義之辨而不苟合其友徐生立本侍父佐鄞縣幕日讀書不輟能輔其父行儒者之政不混俗流行害民事余于彥思之友雖不盡見見此三人知彥思之取友必端如見彥思焉今年舜臣再試再冠右榜舜俞立本又來曰某輩得學於彥思自喜入門之不差矣又喜舜臣之行踵馮先生武也想馮先生聞之亦為之喜也且以為先生賀余謂此非彥思與余之教一皆朱子之法也苟能守是勉勉循循何前修之不至哉奈何俗學雖日讀其書其志在於剽竊語言以作程文故資正誼明道之書以助其謀利計功之私而已甚者至於兜題作義全經且不盡讀况傳注乎士習日趨於見小欲速務外為人終身陷於小人儒而不自知讀書既無真知自得之實效窮不能獨善達何望其兼善宜其任州縣者離道失望貪酷罷軟而不自知愧也滔滔流俗孰與慮此無怪武夫俗吏嗤鄙儒者以為不足用也儒者之道豈果若是乎哉古者大司徒以鄉三物教萬民而賓興之未有不教而可以賓興之者今賓興有制而學校之教法不立弊宜然也此余于二生之來既為之喜今其歸也以余再刪分年日程書贈之以朂其守而不能忘言也嗟夫念余之固陋無他技能在江左學校四十餘年職思其憂以為教之根本在乎朱子讀書法養之根本在歸侵田贍學之士日裕幸自鉛庠謝事歸老林下分甘食貧毫髮無憾今年七十有三豈知不死猶得及見彥思舜臣舜俞立本師友再傳之能自樹植如此亦以自慰其終身嵗月之不為虛擲也然則史先生之學可以上接㬊先生而無愧下行於方來而無弊也於二生之行故各書以送之他日彥思見焉亦當為之一慨云送王季方序昔吕東萊以學時文始破纍世以六經三傳抄注圈點家法朱子因有近日真少讀書之歎余以為朱子之歎固宜而東萊豈輕變家法者蓋以當時科制相戾有不得已焉耳今制本朱子貢舉私議之意明經傳注所主所參所用性理制度訓詁畢備一洗漢唐宋之陋非真讀書不足以應之誠志士千古之一快也第以纍舉所取之文未見有能卓然條傳注之辭而斷之如劉道原者冒原講證結乃宋末剽竊敷演所謂經賊之弊不能盡革文既刋行家傳人誦遂為定式寧違科制而不敢少違時尚故教者學者見小欲速之心得以乘之而以積年誦讀之勞為迂非今之科制使然也噫學術人材盛衰治道隆替風俗厚薄所係救弊之術謂宜推本科制明示經行為本為重用工宜先之序限之以年立學校教法所試非條舉所參注文而斷之者不取立考文之式久而未有以之言者何也他日政恐讀書以東萊家法將不免於變以隨時也余至大間教建德始識戚君子實於池見其讀易朱子本義啓蒙發揮諸書皆手抄其教諸生也程以荀子讀數之法所謂真讀書者其後余來升之江東子實先余訓書院諸生無何郡守聘入學中訓諸生一日喜而告余曰豫得王生季方者來自安西守其家法讀書有緒精熟是務未畢不兼進也有以作文後時開之則曰未能性靜而敏志逺而勤且抄且讀寒暑晝夜若一子實且俾來問余因以輔漢卿所萃朱子讀書法六條以輔其志僅二年四書易經傳注通念曉析同學者不能及逺甚升士方歆之以侍親北歸别余余謂北士南學往往習浮誕無用之詞而自失其讀書嵗月者多矣如季方者賢矣哉余既嘉季方之學且憂子實之教自季方之去人以為迂而莫之從也故惟學校教法考試定式未立之弊所致若此者序以送之庶有見焉而言於上者送陳元弼序余交陳君元弼於鉛庠其才氣文學未能或之先也出其詩文數百篇示余寄興清逺析理明淨具有法度余深惜其屢試于有司不第而科舉罷未嘗不歎其久淹而未有以自奮也元弼尋侍父耐軒翁録事于明别三年而余亦歸明之人士咸頌乃翁平易近民以行豈弟之政且其愛學校士如拱璧元弼左右之功居多余又嘆元弼之敏於為政而未有以自展也今年乃翁代而科舉適復元弼行得戰藝於秋闈明士之知元弼如余者既衆則宜其為元弼喜者不獨余也觀楚兵沉船破釡之戰能以一當百者其元弼也歟蓄極而通何天之衢亨其在斯時歟其在斯時歟送宋鉉翁詩序自程子朱子出而真儒之學復明自許文貞公以程朱學光輔世祖皇帝而真儒之效復著自近年以程朱之學設科取士而真儒之道漸見于吏治嗚呼兹不謂之天之所相不可也宋公鉉翁學程朱之學試于江浙以及格貢赴閩憲辟尋調行御史府掾已流聲實泰定三年判郡以水旱災告公佐其長循行考核躬殫勞盡纎悉得實民瘼上達流徙以安明年春有司賑濟公復蒞其事户霑實惠飢疲以蘇兹不謂之儒者為治之實不可也科目行十年或者疑未見卓卓之效是殆不考所得之士參錯中外百司者今幾處服官政者幾人也宜其道未行效未著也今公為􅒼屬治效已若兹他日得專達固可知也豫安得不喜道其事而張之也送孫以成詩序四明山逺在東南之表地際大海其山二百八十峯周回一百八十里上有四門通日月星辰之光自昔生魁奇材德之士如左元放輩多隱於此往往遺迹尚存自雷谷陳君修煉存養淵默而雷聲世祖皇帝召其侍衛屬車有年曰暘而暘曰雨而雨靈迹顯著纍朝被殊渥雷谷之嗣曰德初張君今以成孫君又德初之嗣其奉綸言出主四明之悟真觀戒行堅確外物不能侵奪積力起廢恢拓舊規觀事既修將北上省其師四明之士與之遊者為歌詩以餞余觀退之送廖道士謂衡山為最髙郴當中州清淑之氣之所窮神氣之所感當必有魁奇材德之士生又非廖師沉溺其教而不出之比豈非四明清淑之氣所鍾者乎余於孫君之行而有感因題於卷首送道士嗇齋吕君序至正元年浙東旱明郡尤甚二月至五月不雨秧不得蒔已蒔隨稿遍禱弗效公私憂惶郡守真定王公居敬謀於郡人禮延大瀛海宫主嗇齋吕君至郡治祈禱君登壇行事叱吒之頃玄雲離合若擁神物雷電交作大雨隨至觀者如堵且畏且喜雨三日夜四境霑足嵗則大熟郡士為歌詩以送余友王舜賓曰道家者流何以能執雨暘之柄兹理之有無吾未之能知也余曰有也此在中庸所謂致中和天地位焉萬物育焉者是已此謂聖神之能事學者之極功使儒而有是學也小而宰一邑大而居變理之任隨其所職與學力之所及皆能致中和位育之效以弭災於未形也故在三代盛時為真儒分內事也後世有其學者無其職有其職者非此學故水旱之既形道家者流因其為長生久視之學煉神氣精以求合於其道積力之久一旦擴身心之體用以應萬衆籲天之求故天亦為之變災為祥故亦能致兹感應也其自私小智雖未可遽以儒者之能事極功許之然亦非平日無存養省察之實而徒事符籙者之所能致也余聞吕君早年所至有禱輒效非獨今日又嘗省其私戒行嚴謹凡其齋醮必誠必敬禮物所入銖積寸纍為四明福地宫興建養衆之用且於吾儒之有學貧而未遇者咸館穀焉經一二年無倦意必盡力推薦俾之得所乃已凡平日求以自慊者多類此非惟吾鄉之黃冠師所罕及而今之章句儒亦未能或之先也故感應於天人之際能若兹也舜賓曰然送慈濟朽石遊山序貴師本仕族與余有瓜葛童時已為浮屠來請學於余弟時叔時叔令讀四書訓之以吾儒之道甚悉貴師聰慧異常時叔每惜其不為儒以用世今主慈濟凡其興修訓養事事畢就條理且戒行嚴甚近吾儒慎獨之學在其衆亦皆推以為弗及今年春將遊四方以廣見聞請贈言余謂余言豈有出於四方之外者貴師所已知也今余縱又以韓子之所以告文暢者瀆告之拘於其法終不能行也今其逰也往參當世之名有道者遍歷名山大川訪求上古聖人遺迹至京師見君民人物禮樂刑政明倫弼教之嚴且明五方異俗而同於尊君愛親默觀天地日月山川人物運行流峙往來代謝實理實心貫萬古而不息能使物物各得其所者貴師得於目見心思而自悟矣奚以言語為哉四明鹿鳴宴序延祐甲寅詔天下設科取士剗前代陋習一本之德行經術以程朱氏為宗以行省鄉試鄉舉省統郡數十大略郡舉一人合數十州通考有一郡數人者焉有連數郡不薦一士者焉其為法甚良而其額亦嚴矣四明由甲寅至丁巳得二士曰塔海曰圖哩由丁巳至庚申復得一士曰翁傳心由庚申至癸亥乃得四人焉曰訥古伯曰薛觀曰史駉孫顧余何人亦與兹選是嵗浙帥馬公鑄命郡守酌古今之禮盛燕享於頖宫以賓興之方伯連帥文武僚佐與學之耆德咸在工歌鹿鳴琴瑟笙磬雍雍秩秩有三代遺風觀者嘖嘖嗟異謂數十年無此舉而他郡亦無有禮儀如是之盛也丙寅之嵗翁君再舉其禮遂廢或者惜之嵗在壬寅復得二人焉曰摩哩齊曰劉希賢於是帥府都事牟公應復慨然曰凡禮有其舉之何可廢也乃與郡守謀悉如初禮余自翰林歸於四明是日間燕席禮畢士友咸請序其事惟周人貢賢書必拜受鄉三物教成則以賓禮興之古之待士如此士亦不敢自輕而思以報效其上國朝取德行經術之士將大有為于斯世士之舉於鄉者其禮可不重歟矧禮廢樂壞正音不聞久矣有志為治者因賓興之際舉其一二以為之兆上以昭聖德下以勵英才非直為觀美而已故余記其本末為來者勸焉宴貢氏詩序上即位之九年改元至正復詔賓興四明郡守王侯政首興學教養勉勵備至後五月二十三日集二州四縣之士試於泮以入優等者十人暨考官而次一十四人宴於泮禮意優渥即席以縱橫禮樂三千字獨對丹墀日未斜分韻為詩以紀侯勸駕之勤云宴倪氏園池詩序昔竹嶼髙公園池之勝甲鄞城廢幾七十年今為倪君濟亨隱居才足用世早事退藏治其亭樓軒檻沼島圃徑位置得宜濟勝有具花竹靚深而雲煙生水波空闊而鵷鷺集使遊者忘去苐不知視髙公所治孰勝惜遺老已盡不可問焉耳元統二年嵗在甲戌仲春五日濟亨宴鄉之士二十八人酒半樂主賓景思之協也各為詩紀其事詩成程端禮為之序夀趙中丞詩序上即位之三年詔以光祿大夫趙中丞江南諸道行御史臺升士德公之教曰天殆以公私我也余曰公以宏才正學為國碩輔宅揆分陜侍從執法出入中外勳在宗社德被生民豈升士得私曰不然惟升幸為治所學校公親戾止進我諸生耳提面命不明強廉立不止前二十年為治書又前三十年為都事凡三至而教我益虔且公愛清溪之勝也買宅以居他日得謝洛下耆英之盛將復見於兹謂之不以公私我不可也咸矢之歌詞以為公夀余不能止竊以為永錫難老之詩聖人所録遂為之序江東書院夀王豈岩詩序易曰澤上於地臨君子以教思無窮蓋言君子之教如澤潤于地之無窮也天能生人而不能教契之教功大矣故篤生其孫孔子不得位而演其教思于無窮詩曰誕后稷之穡有相之道意天之所相豈獨后稷之穡哉升豈岩王公其學得敖吳二先生之傳既廣博而精演明體而達用用咸宜之斯之未信自守益重其居德已足以善俗矧擴乃父仁齋翁之志力創江東精舍公之於朝以禆教建極焉凡諸生受其教者方且人人修之而吉也受者且然矧施者乎易曰井泄不食為我心惻可用汲王明並受其福然則公之施不待汲也天之所以福公以相教思於無窮者豈待祝哉正月既望我公初度諸生為歌詩以侑為夀之觴而端禮序之夀平章中丞迂軒趙公序竊觀李鄴侯之言曰天命他人可言惟君相不可言君相造命者亦曰皇極之建自五行以至庶徵各得其敘畀民以五福也五福惟天所畀實自造命者錫之也有造命之君必得造命之相周官曰官不必備惟其人豈非以其人之難哉今年平章中丞迂軒公以真儒之學居百揆之位弼亮六朝為國元老司憲南臺人見其身備五福而未艾也不知其自天生哲任造命之責者至重也自昔有其人無其位有其位非其人有其人有其位非其時今以公之學居公之位以輔聖明極盛之時殆不偶然也儒者切用所謂充拓得開以位以育者將于是乎見之江東書院諸生受樂育之恩作歌詩為公夀而鄞程端禮序
