body:
  text: 畏齊集卷五元程端禮撰記弋陽縣薪修藍山書院記藍山書院殿堂卑陋弗稱且壞至元二年秋憲使暢公按臨郡守秦公適至顧聸咨嗟命縣令牟公撤而新之公承命惟謹即捐俸為倡諸儒協助掄材鳩工越三月大成殿成又一月明倫堂成公尋代去山長許公至門廡齊庭夾室濯纓亭之未修者建倡勸率悉力修之塗丹雘甃磚石繪先聖先師十哲從祀像器用悉備內外完美宏敞而藍山張先生孫某某亦捐資建先賢祠又以富春園地十畝有竒歸於院以嵗租入供祀事而某奉祠焉始是年九月至六年十月畢工邑之士人咸曰弗紀成績來者罔勸使來請記余辭不得命謹按書院乃藍山先生講學之地先生名卿弼字希契宋咸淳間登進士第官至太學博士革命隱居邑之水南以經行師表一郡門人楊應桂申益章建書院前至元十七年提刑簽事王公勉勵作成設山長來學之士日盛而先生之後擢髙第者至今不絶書院為田若干畝地若干畝山若干畝租米若干石錢若干緡余謂自後世所教與所賔興者一非先王三物之舊州縣學之設雖或如前日之盛有司所以勸勉督程者不過趣其文詞之工以要人爵故所得之士不惟德業無以追配古昔之萬一而離道失望者往往有之故前代志道之士寧棄舉業確守師說與其同志講學於宴閒之地以自脫於有司程督之外此書院之所由建也其後書院益多士之有志者少其所習者或無異乎州縣之所工此識者之所深歎也洪惟國朝自許文正公以朱子學光輔世祖皇帝肇開文運百年之間天下學者皆知尊朱子所注之經以上遡孔孟其功大矣貢舉之制又用朱子私議明經主程朱說兼用古注疏經義不拘格律蓋欲學者讀經有沈潜自得之實其所作經義能條舉程朱與注疏之說辨漢儒傳注之得失一洗宋末反覆虛演文妖經賊之弊俾經術理學舉業合一以便志道之士豈漢唐宋科目所能睨其萬一士之學於今日者豈非幸與惜乎賔興有制而學校法未立故其所教所學不過隨其學官之所知所能故猶不免於前日之涉獵剽竊而無沉潜自得之實所試經義固守反覆虛演之舊格而試官不能推本設科之深意以救末流之弊嗚呼自孔子作經已以讀書為教儻以見小欲速務外為人之心讀之此乃儒之君子小人所由以分可不屢省而深戒之哉竊謂方今惟宜以朱子白鹿洞學規正其宏綱以所訂程董學校有其節目又以輔氏所稡讀書法六條確守而不遺其一焉則庶乎學校有造士之實有以上禆賔興之制志道之士無擇乎學院而皆可以為藏修游息之所矣余既為書其興修之歲月因叙古今學校之得失乃以朱子讀書之法為學者勸牟公名某字某蜀人為邑多善政許公名某字某番昜人是年十一月甲子鄞程端禮記三一堂記咸平李侯希仁以三一名堂蓋有取於漢馬季良忠經之言也客有問於余曰經謂一其心為忠者何曰一者心純乎理而不雜不息之名一其心斯忠矣曰謂一於其身一於其家一於其國三一為忠之始中終者何曰猶大學言欲治國先齊家欲齊家先修身也曰謂身一家一國一者何曰猶言身修家齊國治也曰謂百祿至六情和萬人理者何曰此言三一之效身一而意誠心正身修則動罔不吉而百祿至家一而孝弟慈則三者親而六情和國一而興仁興讓則萬人理也曰三一之有合於大學者然矣忠之所為一而能一其三者何曰孔子曰吾道一以貫之曾子曰夫子之道忠恕而已矣是則忠即一而貫即恕也夫既事事物物皆此一之貫雖謂之萬一可也經言三一者亦特舉其切近而大者言之耳曰一有天地聖人學者之分者何曰道之大原出於天至誠無息者道之體萬殊之所以一本也萬物各得其所者道之用一本之所以萬殊也天之一曰於穆不已聖人之一曰純亦不已天與聖人自然而一者也學者之一則有待於敬主一無適而后能一之者也曰然則學者可至於聖人乎曰可周子曰聖可學一為要一者無欲程子曰其要只在慎獨敬義夾持直上達天德此希聖之功也曰經又引書云惟精惟一允執厥中者何曰此上古聖神道統相傳之要指人心危而難安道心微而難著惟精以察之不雜形氣之私一以守之純乎義理之正則動靜云為無過不及而信能執其中也其曰執中者明隨時取中之所以得一也其不曰執一者懼其或流於子莫無權之執而非一也曰一之為德可得而詳言之乎曰一者道體之純全聖功之極致也精粹無雜者也始終無間者也該括萬物者也通古今達上下萬物之原萬事之幹也語其理則無二語其運則無息語其體則并包而無遺也魯鄒聖賢濂洛閩湘先儒之贊之者明且盡矣奚俟余之荒陋今李侯扁三一以自警能終始惟一而日新焉則德業之崇廣也孰禦曰願記吾子所述者於堂之壁曰諾至正四年閏二月壬午甬東程端禮記鉛山州修學記至元四年六月辛卯暴雨三日夜水大至民居下者及簷學地髙猶半壁屋歲久朽蠧前後修者徒事外飾故壞十六七知州奉議李侯顧聸咨嗟即捐俸為倡州學暨宗文書院諸生欣然協助得緡錢若干益以學廩鳩工市材書樓講堂兩廡齊舍儀門蓋瓦易木築墻甃道從祀鄉賢奉祠嚴整貢士費君剛中獨新櫺星門內外完美朝散王侯繼之益以興學為務州長瑚緷承務通守布達錫哩承務張侯承務判官鼐瑪岱從仕贊助之始是年七月壬子至六年十月乙未畢工端禮倚席茲學日以朱子讀書法嚴督諸生以求實效侯即歲首遍勸鄉社令秀士入學朔望親為講試咸知自奮方議修學水適壞因致力遂成州之士咸曰弗紀侯績來者罔勸而屬筆於余竊謂鉛山乃朱子與諸賢講道之地其記學之碑有曰學者日用起居飲食之間既無事而非學於其羣居藏修游息之地亦無學而非事其警後學者至矣盡矣抑又謂讀書雖為所學之事之一亦惟讀書有自得之實則所學事事有得矣李侯名榮祖字茂先廣平肥鄉人王侯名元綱字彥常霸州文安人又以學廩少不給經費究弊所由如遵通制學令田廣租輕者必使復額革豪户之僕佃者令親種小民以租之入彼者納此至有增復三四倍者西鄰徐氏侵入學宫墻內占佃井亭厨基架民屋者照經理官籍令其拆除歸地於學以復永平志書之舊從其撥田二十畝有竒入學歲收米十石抵租地錢取宗文佃占魚湖公留養士禁佃以絶後弊聚官書數千卷擇其要者㸃抹句讀以惠學者以田地山池錢穀所復之數及量租入為經費制留師生廩膳以革所養非所教之弊悉刻石垂逺他皆類此云棗强縣學修飾兩廡及從祀先賢像記孔子廟遍天下其制度沿革多不同然皆所以尊崇聖人而闡明其道使君子小人有所聸仰感化同歸於學則一而已矣是故殿庭廡門有常度容貌佩服有常儀尊罍簠簋有常數師弟子有常員祭祀有常禮苟奉天子之命司牧民之寄者必有志於其間也冀州棗强縣舊有孔子廟學在東城之隅自宋歷金壯麗宏敞而兩廡不修從祀頗缺至正十二年某官丹珠爾策為縣達嚕噶齊下車謁廟慨然以興學為先務即倡出俸錢若干好事者競發私幣以相之鳩工度材葺兩廡及旁舍之圮壞者裝塑厯代先儒百六人像冠冕履舄丹青炳烺端拱列坐儼如生存然後孔子廟內外完好不失典則有以大啓士民尊敬之心深知監縣承宣朝廷文德之意翕然從事於學而不能自己也教諭龎君元德述其事以來請記夫宰百里而以禮樂為治聖人固善之矣然在當時如子游之於武城蓋已不可多見况千載之下哉今棗强大夫能作新學校以先官政其事雖略而聖人之道實係乎此禮樂之治實原乎此其功豈小補哉龎君曰與諸生弦歌講習儀刑親炙以達聲教以淑人心以無忘縣大夫之德其志有足尚者故為書而記之然竊又有說焉聖賢逺矣獨其言與道存焉爾學者誦其言求其道必當究其心而泥於跡雖學為無取也後之君子亦有省於是也夫至正十四年十二月記三瑞圖記寧海縣達嚕噶齊瑞齊公蒞政之二年當至順三年戊申邑東老子宫鐵棱木閲二百餘年父老相傳此木作花則歲豐夏五月有花煜然邑果有年六月邑北浮溪之陽粟秀兩岐八月邑南龍山之麓靈芝九莖生焉惟茲三瑞昭不可誣謹按宋政和間番昜忠宣洪公主簿茲邑實德及民池有雙蓮木有連理而子適適産焉後以異科躋宰輔邑人以三瑞名其堂郡乘載之傳為盛事距今二百二十餘年而三瑞復見於公宜邑之人士繪之丹青形之歌詠見之紀述而不能自巳也邑人述公之政曰勸農興學也摧暴摘姦也治民無苛政橫斂也律已絶苞苴請謁也猛虎為害雨暘愆期禱之而去且應也謂公之致祥者在此余謂是固得之矣而所以考引公德者猶未也洪範庶徴徴之庶草蕃廡卿士師尹庶民尊卑皆有徴中庸致中和天地位萬物育說者謂感通之理亦及其力之所至而止今以三瑞徴公長百里而瑞應皆在百里內則公之敬用五事戒慎恐懼而慎其獨者必有以為之本也公雖不自言而天固已知之矣凡其外之見於政事之善者雖皆此心之發若夫體信達順之實則在此而不在彼也余聞天人相與之際勢雖逺而應不虛使公日慎一日而侈心不生他日升而為守漁陽之麥穎川之禾不難致又升而居燮理之任四靈可使在郊陬宫沼也惟在益慎以充之而巳余既記公為邑致祥之美又勉其益慎以充之也於是乎記鏡波亭記道廣德至建平八十里盡荒田平隴無亭榭樓驛可為遊偃眺矚之所以其民朴陋儉嗇力耕蠶勤工作不識為浮靡事有雍土之風道路過者每歎無所休其勞焉夫勞者民之所覬以逸者也而致民遊於逸者民牧之事此鏡波亭之所以作也王君起宗假令茲邑之二年八月作亭於治所之南以臨桐溪越七日亭成於是跋涉於道者有所憩濟於溪而值風雨寒暑者有所避故咸樂斯亭之成焉君曰吾亦與客飲此以同其樂乎是時天秋霜落溪水鏡平扶桑出日微飈乍驚溶溶皛皛流光不停滉蕩衽席注射榱甍如入廣寒坐瓊臺與列仙將迎也客醉而謳孤響飛流下激弱波上薄太清又如馭飄風凌清氣相羊九霄而聆天韶之鳴也公曰是宜名曰鏡波命客程端禮志之曰政道二嚴也和也公之始至絶苞苴謹法度正經界均賦役而民之病者與與焉蘇矣吏之姦者厭厭焉沮矣非嚴以作其始乎教令既明綱紀既布又作亭以休其勞而與邑之士民及四方賔客飲酒言議以通上下之情而訊其得失非和以濟其終乎嚴和相濟非政之道乎自昔善政少而苛政多庸無以示繼者乎遂刻石於亭左重修靈慈廟記至正元年冬十月庚申重修靈慈廟成廟史述鄞人之意以事狀來曰國朝歲漕米三百萬石給京畿千艘龍驤鯨波萬里颶風或作視天若畝號神求援應捷枹鼓靈光一燭易危為安捨我護國庇民廣濟福惠明著天妃其將誰賴故歲時天子遣使致祭禮秩與嶽鎮海瀆等屢加封號寵賜廟額廟宇損壞官為修葺凡神之所以護國與國之所以報神可謂至矣惟是廟在鄞之東角者歲久弗葺門堂室寢木朽瓦摧像設漫漶甚非所以揭虔妥靈也慶元紹興海運千户所朱侯奉直蒞事謁廟顧瞻咨嗟念官無儲錢首捐俸為倡同僚暨市舶官吏欣助漕户協力鳩工市材剔蠧易堅瓦石丹艧內外一新侯日程督無敢苟且雖修實建興工於至元五年夏六月越三寒暑而畢鄞之耆舊咸曰弗紀侯績來者罔勸使來請記余謂易言涉大川之占凡十三他占未嘗若茲之費辭也豈不以險莫大於涉川聖人因蓍卦之神明以先民用蓋欲其視占之利否以為進止也夫大川之險不過言江河而已是猶未以大海之險言也他事可視占以為進止歲漕不可以進止言也故前代無敢絶大海而漕者禹貢可考也當時帝都在冀東西南三面距河諸州貢賦以達河為至其曰夾右碣石者以北境之水中髙不與河通故必自北海入河口耳其曰沿於江海者是時江淮未通故必沿江海入淮泗乃能達河耳未嘗海漕也其後漢唐漕河淮三河以給關中風波之惡砥柱之危十失七八水陸轉卸日力有限史載其十鍾致石用石運斗其艱且阻可勝言哉欽惟國朝都燕聖謨獨斷創為海漕萬斛之舟祥飈送帆瞬息千里不浹旬而畢至京畿非惟前代不能致今日之大利亦未聞有明神能於大險中顯效靈績助成大順若今日之昭昭也於戲茲謂之非天不可也昔越裳氏以海不揚波知中國有聖人其言益信易曰自天祐之吉無不利既曰自天祐之則其利涉之吉果有不占而孚者矣故余因紀其修廟歲月并考今昔漕運之異而識其略如此云重建寶梵教寺三門記至正元年十二月已卯寶梵教寺三門成住山居朗師以縣學教諭葉君桐事狀來曰明郡之象山寶梵寺去縣東北一百三十步創於宋建隆間為東禪院治平中更今額厯四百餘年矣惟昔法智大師以至行約言闡揚教法大行於兩浙南城延慶實為祖廷故明之諸邑近郊丈室地習其教者多博辨秀異之徒若居朗師者是也師主茲山踰一紀居一日必葺木石磚瓦歲積月纍邑宰穆公承務里儒學録史公德暉首為之助士民之施財輸力者響應三門遂成翬飛宏麗壯觀茲邑師又出衣資倡率耆舊復岸廢田百畝新修輪藏居養既裕教法日與師之功也來請記余屢辭而請益勤余謂吾儒之主學校者重以有司飭勵爵秩敘勸食焉而怠其事棟宇頽圮教養日弛者十常八九聞師之風亦可少愧矣余前二十年見師講習於延慶前堂晝夜勤苦纍年不出骨部聳異目光射人固已竒之知其他日之能有為也嗚呼世之人材為佛老氏得者多矣宜其教之興也余既為書其事且書所嘆以警吾徒焉至正三年三月日鄞程端禮書元興天僖慈恩教寺記世祖皇帝以神武一區宇治功底定期與休息因民俗嚮善求福咸歸佛氏以慈恩教法未行南方選僧任教師者三十人布江南諸路擇名山開講至元二十五年召見賜衣敦遣佛光大師德公來至天僖三十一年成宗皇帝寵錫師號有司復慮恆産之不贍爰益以旌忠廢寺之田入之皇上即位之元年賜寺今額初吳主感舍利金像之異迎僧㑹立塔建寺厯代崇奉有加逮佛光師欽承明詔發揮素蘊開筵集徒大闡教法慈恩宗㫖口傳心悟各有所就幾四十年自朝至夕寒暑不輟清修苦行彌久益虔飲食起居咸中禮節始至頽垣壞宇穿漏將仆又能銖積餘財撤而新之千楹百堵宏敞倍昔金碧翬飛內外如一百爾所資悉皆完美較其功德為江南諸師冠即世四年宗支嗣教一道遺矩可傳永永其嗣某迹其事來請記余以為佛氏日興以盛雖其為法善誘其亦任事者得其人也吾儒學校之教有司勉勵敦勸亦云至矣近世職教者或望月與諸生一再㑹演說解語則為盡職諸生經行皆所不問師生至未相識已代去能奮然以師道自任蓋寡豈世之曰師云者為彼得而此失之歟抑此之擇師之道未至以致然歟余為記其事因書其所感者云著存庵田記桐汭子有王君謂程端禮曰余夫婦之藏得卜於鎮山之陽王村之原吾子既名其屋曰著存之庵俾某知致其愛慤幸矣余承先祖父之遺户有民田若干畝官之二稅田營田若干畝惟是官田磽瘠易旱易潦所入絶少而輸賦重甚每歲必以民田之入助輸官田之賦僅免門户隳突捶楚之害念異日子孫貧富之不常民田易售而官田難除害將無窮乘今日之苟完預以某處民田若干畝撥入著存庵為户俾子孫貧不得賣永為官田輸賦之助餘以供祀事歲使子一人掌之周乃復外以某處民田若干畝贍守墳之人及焚修之用懼其久而偷也吾子為我識之余謂父之於子既生成之而全付其家又審其利害而預為之備所以遺之者其心無窮也子之於父宜思承家之責至重繼志述事於無窮也往往苟目前以自拔其芘賴生養之本害及其身而不恤者何哉蓋以忘其身為父母之遺體也倘知致愛致慤而著存不忘乎心則知身父母而心父母矣况若茲田之遺以避切近之害者乎凡當繼述者將無不力不死其父母在推著存之義而已矣子有曰唯唯因書以為記碑監抽慶元市舶右丞資德約蘇穆爾公去思碑至正三年冬資德大夫江浙等處行中書省右丞約蘇穆爾公監抽慶元市舶既去郡耆老述舶户王良臣之言曰良臣等為舶户有年監抽官之亷明革弊未見如公者實德在人弗能忘願有所紀刻之貞石以式來者謹按國朝因唐宋於慶元泉廣建市舶司設提舉官酌古今之宜頒舶法二十有二條抽分省官親臨具有定制惟是近年或委他官選擇未精法外生弊舶户病之洪惟今上龍御內外任官惟賢惟才大綱小紀惟監成憲重熙纍洽太平之功格於皇天乃二年十一月預以蕃舶回帆申命行省而我公實來惟公自員外禮部升郎中經厯內臺侍郎禮部刑部侍御西臺郎中中書左司尚書刑部兵部侍講集賢宣慰湖南監江浙江淮財賦侍讀集賢亷使淮西治書南臺參政湖廣留守上都使行宣政二十遷而右丞江浙其於國家剸繁治劇决大議成大功何可勝舉今監抽一事未足贊公才美然以玉雪之操金石之節久孚朝野正色率下不令而從事無大小莫之敢欺此則非公不能也公自下車宣諭德意撫恤海賈據法從事無所擬議不緩時刻防檢嚴密無罅可乘宿弊盡革至若變賣價直矜閔孤嫠尤所盡心行之得實選委拘鈐巡邏得僉帥朝請鄂勒哲依公治中在朝列公素著亷節協心贊助畢事之夕乘傳即行宜舶户之額手欣忭頌德而不忘也易曰理財正辭禁民為非曰義惟舶人通道九夷憑國威靈必戒生事中國所寶必截其出是曰禁非征商薄入曰與曰取是曰正辭理財之義既詳諸法以義為利可為盡善自非大人君子克畏四知目眩珍貨鮮不動心矧其逺涉鯨波往以歲計疫冦不虞捐生易利期償稱貸何忍法外攟托而取之乎故任法任人兼在所重宜簡上心也昔唐蕃舶至廣有下碇之稅有閲貨之宴犀珠磊落賂及僮僕後以孔戣之亷自右丞出鎮一切革之韓子紀其事今公亦以右丞來革慶元之弊豈偶然哉惜余筆力之不稱也既為書之且為頌詩三章俾舶人歌之以相舉棹云頌曰元德配天奄有所覆不寶逺物民康是富聖子神孫克類克承太平之功昭格天明昭格天明篤生賢才永肩一心邦基是培天子之仁矜我賈人理財之義相臣克勤相臣克勤為德為民啓沃作霖亟秉國鈞海不揚波越裳入貢天子萬年郊藪麟鳯慶元路總管沙木思迪音公去思碑皇元統御萬方薄海內外悉為郡縣郡有守守職視列侯任至重也明為浙東大郡其陽大海逺邇方物夷商貿遷風帆浪舶萬里畢集事視他郡尤劇守是土者必躬率以亷為治持大體寬嚴適中乃稱任至順三年沙木思迪音公以吏部侍郎來守茲郡政成尋去郡父老狀公遺愛來求余記曰公飲氷食蘗始終一致犀珠磊落不以動心待人寬不能令其喜怒隱惡揚善俾自遷改政先有司不急細務由是化行民安如春雨膏物而無其跡公之惠我其略以是若夫發奸摘伏問烏攫肉非公所務也二州四縣之長二暨郡有司莫不用命渠陂修築田無荒蕪生聚蕃庶盜賊帖息訟諜退縮學校興舉異時富商海舶貨江浙省分遣屬官監賦事侵牟百出公用丞相命一再監之為設方略㑹計悉當每歲漕運米物十數萬斛管倉庾者或與漕户不相謀紛然生事公出之如所納咸服其便去年夏少旱今秋淫雨公禱之皆應此又公之餘事耳田里日夕德公噫公今去矣敢忘乎哉願有紀余謂公為治弗自用以取名聲何乃得民心深有如此者昔漢太守羊續劉寬治南陽以亷以寬得民公豈非近之耶余既紀其事併為之詩俾民歌之以永其思詩曰揭揭我公始來自京有猷御事以綏則寧維茲伊何自德出之亷慎初終寬弗至墮雨風其時桑榖茂暢氓胥有言茲公之慶五馬髙蓋蒞我溝塍以教以戒穆穆有經我喜鼓歌歸相告語毋顛倒爛漫以憂召父維公之賢維人俱依維馬弗可縶奈何乎歸公而歸矣豫曷弗思思而弗置我歌我詩慶元紹興等處海運千户朱奉直去思碑奉直大夫朱公彥文以至元二年十一月為慶元紹興等處海運千户公剛毅有材略凡職業急所先務不憚艱險利害興除知無不為為無不力初皇慶二年冬十月省部奏准溫台慶元每石腳價錢一十一兩五錢浙西紹興每石一十一兩蓋視道逺近為差也遵行已久莫之敢易至元三年四年浙東歲歉無糧撥溫台慶運户駕空船往浙西劉家港安泊聽運既增逺數千里風逆則逾月不能至經涉沙灘嶕島之險修補船器工食之用費倍常運行省謂以空船至浙西為易事止依浙西腳價減除每石五錢運户至有罄家産不足以供費者楊義等陳訴有司不為准理哀苦莫伸公為申請於漕運都府即令馳驛赴中書省稟告公敷陳詳明宰相韙之送部下架閣庫照元定腳價全文明白咨行省下都府自此溫台慶元運户之撥裝浙西糧者得復奏准定例支給運户之困得紓公之力也今公既去人之思公不能忘使來請記余謂京畿萬户輻輳食用衆大加以六師糗糧百官祿廩所以控引東南漕運以給經費事至重也漢唐運於三河涉底柱之危險阻萬端十失七八有用斗錢運斗米之艱又官造運船欲其堅固倍給其直以裴耀卿劉晏之智非不知其勞費蓋以事有終不可已焉耳洪惟國朝天祐神助聖謀睿斷創為海運以數百萬之粟不旬浹而畢達京畿功力之易視漢唐何啻相萬豈在減此已定腳價毫末之費哉不有我公之仁能以下情上達豈不為三路運户無窮之害是宜刻石以紀公名額森巴哈保定武遂人祖以碩學粹行教授鄉里兩徴不起父以茂異舉厯清要公以膳珍司克埒穆爾齊入仕積官至前職敦尚禮法以賞延合得官讓其弟宗顔其宦學蓋有得於家傳者如此公在職興修靈慈廟余已有記茲不書慶元路推官胡公去思碑至元三年夏胡公代且行教諭屠逺以事狀來曰孔子謂古之學者為已張氏以為為已者無所為而為之者也吾黨之士藏修閒暇兢兢焉日以是自省至其臨事猶或失之竊觀胡公職刑獄之繁劇其處已接物乃能嚴利義之辨整暇詳密心跡始終三年一致茲豈有所為而然者庶幾乎為巳之學矣人之稱其孝稱其亷稱其治獄之平允逺邇上下無間然也而鄞士之覿德尤詳弗能忘願有所紀以為士之學古入官者勸公名潤祖字敬先廣平之永年人也奉母來鄞量俸入以為養雖味乏兼珍而婉容愈色曲盡其歡自奉至薄人所不堪公退即杜門教子士非雅飭不交吏非謹厚不用苞苴私謁無路可通猶自視欿然日慎一日初公之來當積弊之極繫囚滿獄至淹十年或四三年公朝夕審録不憚寒暑其所平反不可殫紀洗寃澤物之心甚於饑渴死獄必求其生而不可得乃已其或循私變易是非至興誣謗終弗為奪亦未矜為已能也既代無以為歸公性行介潔早年由吏省部入仕以不能媚權貴恬於序遷前長永嘉郡幕亦以廉慎守法有聲余謂公之心知求事理之所以然所當然而責其身以必然而已豈他有所為哉昔萬石君家不言而躬行雖齊魯諸儒質行者皆自以為不能及如公豈多得哉今鄞士之去思亦曰有孚惠心自有所不能已焉爾故余不敢以不文讓而紀其事且系以詩曰聖門之學曰惟為巳其已伊何此心此理理為心主其善無比利善之間毫釐非是明善誠身斯已為是干譽為善雖善亦利是曰為人非巳之謂侃侃胡公制行端粹親老而仕悅在養志其母日問平反今幾事待公理不數伯始清畏人知家法嚴此學古入官今見斯士遺德在鄞刻示無止
