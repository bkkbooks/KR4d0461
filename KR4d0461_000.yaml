body:
  text: 提要畏齋集六卷别集類四元臣等謹案畏齋集六卷元程端禮撰端禮有讀書分年日程已著録其詩文名畏齋集見于黃溍所作墓志而不著卷數諸家書目亦多不載故世久無傳惟散見永樂大典中者尚得詩文百餘萹謹依類編次釐為六卷其學以朱子為宗故作孫叔會詩集序云詩至七言而衰律而壞詞而絶自朱子出而古詩遺意復見蓋朱子之學不在乎詩故其作有自然之妙諷詠勸懲之實又送牟景陽序云蜀文再變於魏了翁了翁學程朱學故未嘗有意為文人之文而文特妙其全集宗旨不出於是夫朱子為講學之宗誠無異議至於文章一道則源流正變其説甚長必以晦菴一集律天下萬世而詩如李杜文如韓歐均斥之以衰且壞此一家之私言非千古之通論也然端學所作尚皆明白淳實不骫于正而其持論亦足以矯淫哇艷冶之弊於文章尚不為無功故糾其膠固之失而仍裒緝其佚萹偹一格焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:439bcc56f5060c47db4d2eb3ed4143da08fe3fe468018c22b6878ef14f3be3b3
