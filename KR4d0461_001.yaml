body:
  text: 畏齊集卷一元程端禮撰五言古詩古意東林有棲鳥中夜棲復起磔磔繞樹飛悲鳴不能已羈孤寡儔匹枝寒不可止幽人發寤歎起步東軒址大鵬飛南溟摶風九萬里斥鷃無所適翺翔蓬蒿裏為大既云樂小者亦自喜爾於衆鳥中栖栖乃如此南山有佳木枝葉何薿薿客問此何木云是杞與梓問種此何為棟梁專所擬問種幾何時百年殆不止客子嘆以愀吾謀豈及此春種秋已穫口腹且不理人生不可期百年詎能俟儀鳳何濟濟栖息在梧竹置之雞鶩羣肯與同飲啄所性自不同匪因事乖激從兹鳴高岡銜圖集帝側次史耕野借書韻掩關臥空齊寡德嗟無鄰坐令日月易見兹夏木新俯仰閲今古孰能返其淳有疑未云袪就正乏所親譬車適千里曠焉迷路津聞君忽叩門起迎正冠巾議論一超越諒非今世人遺我金玉章把玩良足珍言欲假詩書討論意彌勤為君出所藏不辭筐篋貧儻足為君益敢厭來往頻雪野齊混沌昔云判高下散衆殊山川互阻深道路饒﨑塸滕六若有意補塞歸糢糊誰知甚險艱行客多迷塗何如萬原野坦坦皆康衢常時人素履此日心亦孚平平展天鏡蕩蕩開玉壺招搖踏廣寒汗漫遊清虛元翁心地明直與此境俱融作一片玉皓皓歸太初酬張荷屋惠酒之作春風被草木華色一以妍散策登崇巘泛舟遡晴川悠悠憺忘歸孤嘯激雲天嗟無同懷侣俾我心悁悁美人在山阿貞操松柏堅攝衣往扣門一見情依然壺觴逺見贈侑以金玉篇酒昭意不薄詩敘别經年惜哉不可留整斾吾言旋短章聊為報中懷詎能宣送人遊越㑹稽揚州鎮名實著典籍禹昔巡九土於焉㑹羣辟澄湖三百里寒光湛空碧郊關連崇山巑岏類天劃古來磊落士多此託棲息王謝有子孫風流猶未革欲遊無方舟魂夢勞宿昔今君挂江帆迤邐詣幽賾上探神禹穴下訪王謝迹兹特江南竒氣象猶迫迮更為嵩華遊馳車陵谷客嗟我足如紲坐使歲月易寄內去年汝歸時汝父扶汝輿今年汝歸時哭父攀靈車豈期一年别罹此憂患俱人生不可保甚矣夢幻如汝哭固有感汝行良可吁汝有堂上毋亦復雪滿顱既無門楣喜生汝將何如幸汝有佳弟可樹先人廬汝弟昔在雛今皆父而鬚豈不念老毋為奉千金軀天寒山日短雨雪滂在途作詩為寄汝慎勿笑我迂詩成落清淚梅月來庭除呈信州路宣差聖代仁配天生賢亦忠厚公任承宣寄一麾此出守巍巍靈山高千里祥雲覆澤物寂無言但見禾黍茂沄沄玉溪水流長深且瀏魚不識數罟自樂免驚透公政亦如此實德民父毋小民雖蚩蚩口碑心自鏤行看入秉鈞八荒納仁壽賤子生四明才疏學尤陋稼軒守藏書豈憚逺奔走久懷仰德心未得遂良覯再進畫㦸前不覺成宿留病起有懷吳德堅時教授鄰鄉不歸二詩寄之抱琴適南澗澗水流濺濺上有修竹林天風韻泠然我欲寫其聲竟日不能絃野老渡澗來牽牛飲我前自云作勞苦竟藉草石眠問我此何為聒聒不暫捐鍾期無復生伯牙空自憐此人聽以耳誰能聽以天君不如二子不如抱琴還再拜謝野老歸哉樂忘年日日倚高樓遙望西溪山山深草樹長煙雲何綿蠻中有千歲松修柯出雲間鳳凰翔其巔好鳥鳴􅚓􅚓仙人紫霞裙招我碧玉環浩歌激林谷玉貌安且閒問之不我言無乃吳彩鸞褰裳欲從之山險道路艱默坐自嘆息歲晏雕朱顔桐廬舟中奉寄宋推官仲翔兼柬余知事伯貞換舟桐廬驛寒雨泝清曉微茫煙樹來眩轉沙洲繞危臺倚石壁釣者跡已杳念我平生歡語斷意未了方提文章印遽隔霄漢表前日過逋仙穿梅度林篠壁間見妙墨勢若蛇蛟矯高詞接黃九幽夢到蘇小邇來定多事無復親魚鳥空餘折獄心攻苦如食蓼樓臺閟城邑欲往路深渺為語幕中賢相將遊鳳沼用韓退之出宰山水縣之句為韻賦五首呈東巖王明府巍巍東魯山巖崿何崒嵂豈徒興雲雨生賢為時出粵自産尼聖秀氣久蟠鬱後有石與孫正學相紹述雖云位未充奸邪困揮叱聖經剔蕪穢冥晦揭日月兹氣今在公已久著名實貞操百鍊剛况復輔經術民親澤易及志行身豈屈願公崇德業屼與兹山匹諺云六十年兹邑得賢宰前宰子施子為政實樂豈事有利田里嗜若嘬脯醢于時值歲荒老稚恃無餒境內盜莫侵畏罰當刑罪遺愛在人心歷歲久逾在公來適庚子慰此小民待渠渠護良善有若植蘭苣除惡絶本根豈復顧怨憝兹心實昭明皎皎氷雪皠前施後有公名聲兩􅐑峞所恨事掣肘每使公心痗公處施子時未必功不倍彈琴不下堂戴星不得怠為勢有難易才豈云弗逮所同在邑治如水畢赴海他時繼者誰諺語當不改凱之宰山隂山隂萬山環邑事號繁劇治者稱獨艱凱之御以約簾垂清晝閒邑事既云理復得玩羣山建平事豈簡公能息嚚頑南山極雄秀大巖聳雲鬟驅馬詣幽窅杖屨窮躋攀掇此山上茶舉瓢酌潺湲能賦復能畫日落猶忘還風煙遭攟托披豁呈天慳豈讓顧虎頭三絶專人間郎水出桐汭西流百餘里臨流構新亭公日觀此水公呼父老言兹可喻政理風恬水鏡淨清徹湛無滓明可燭鬚眉一一見涯涘汲者纓可濯濟者舟可艤積雨混濁流橫溢若奔駛牛馬暗莫睹蛟鰐森利齒豈徒濟者危隄障將圯毁父老再拜言公念幸及此此水濁日多清日苦無幾流清難自全濁者日瀰瀰公來水既清公去復前似公有一寸膠慎勿寶諸已當往治河源餘波俾霑被公謝父老言吾敢怠以止悟彼滄浪歌仲尼識孺子賤子家浙東承晤此山縣無術裨道化空忝文學掾人生恨無位有志不得薦矧兹萬家邑公實司溺援素抱匡濟才小試詎云倦馭吏若束薪曽不得輾轉鯨鯢牙角利赤手欲拔剸于公任獄吏子孫尚昌衍所積公已多百福報所先世儒謾讀書謬云破萬卷臨事輒袖手瞪若正牆面遂使真儒效曠世不常見作詩激庸懦匪同事誇衒同知鄭公禱雨得雨禱晴得晴鄭侯守建業惟飲建業水飢羸苦未蘇夙夜勤政理秉德哲而肅所格無逺邇秋旱禱鍾山回車雨隨至雨多侯復禱即日為開霽遂成大有年萬家高露積實德為侯心心動應兹氣無心鍾山雲敷斂惟侯意鍾山且無功社鬼何所致送周德可録廣德學我别三峯來復得靈山秀君拋靈山去三峯將爾覯靜示萬古青仁體而效壽寸雲雨千里百穀膏以茂學山我未能倚席成宿留君學究體用矧出元公胄講道三峯下三峯列窗牖教雨媲三峯千里資善誘菖蒲鱗鱗菖蒲根蜿蜿類虬龍兒童競採掇泛此新酒醲共言飲此酒可冀延年功座客笑而言求效何匆匆服此不終日乃欲希韓終我謂客勿言萬事莫不同用力未期月謂道真難窮遂使羣聖言竟為紙上空世無子董子孰為開愚蒙客但當飲酒何庸責兒童題有之得潘季通畫寄墨梅卷後故人在天末相思江梅發攀條逺持贈貞心庶云託猶恐歲寒姿亦復有零落寫此歸囊楮用慰遙相憶勿云粉墨假百年不改色庚午四月一日小飲光霽子實仲容有作次韻春暵欣雨集復惜年光流園林入深窅風日尚妍柔繁華變清樾棲徑餘香流戢戢階下笋直節見萌勾而我得佳友攜手此尋幽華構既空曠崇墉亦遭周瓶罌混清濁雉膏續腵修思與晴雲飛論若獨繭抽嘉樹影自移好鳥聲相酬人事諒多感天遊本非謀未易輕虞卿著書守窮愁題宋鉉翁詩卷宋侯北庭彥令聞如圭璋學海究源委宦途起翺翔集烏贊朱博埋輪佐張綱疾惡惟務去視民乃如傷飢羸困水旱咨詢極精詳王成難僞户汲黯先開倉實惠既下霑英聲冝逺揚簡書暫風憲劍佩趨明光食檗善自愛寶此百鍊剛題菊逸手卷英英江梅芳粲粲籬菊鮮梅清未為逸風占花信先雖避桃李俗後為棟所牽季秋百卉歇霜下菊芳妍貞姿傲歲晚獨以節自全所以陶處士愛之見詩篇八表同昏時醉石供高眠飢却道濟米不書義熙年逸氣振古稀人花無間然誰與散人裔菊逸扁其軒送孟後村赴臨海任嘗聞興公賦永懷天台勝故人美無度官協遊山興桃花遡溪源杖藜躡雲磴相期何處好石橋共清憑讀程雲心文集長夜耿無寐起讀程子編凉飈入庭竹一笑當我前清角致風雨此語非虛傳鯨魚與翡翠未用分媸妍咸池張洞庭蕩默本自然聽者得其外懼怠惑遽遷感歎在一牀月落西南天已卯長至前二日同景陽侯遊鵝湖次吕海月韻二首鵝峯高入雲上下異晴雨嘉樹鬱千章六月不知暑堂堂紫陽翁講道此容與斯文統有宗異論廓寰宇遂增兹山高巍巍亘終古裹糧訪遺跡豈為尋佳塢兹來遊招提霜葉響風雨藏新碑已漫坐閲幾寒暑南豐星斗文論正乃不與紫陽講道地教異去吾宇所習有出入吾道無今古徘徊不能去夕陽下山塢上已陪東巖赤山蘭泉修禊分韻祓禊記佳節浴此蘭泉清芳漬不待掇水止元無聲悟悅竟忘言一振華裾輕采真孰為妄至樂無達生代上高副使二首大鵬飛南溟振翮萬里至天馬馭長道燕越一頓轡斥鷃與駑駘側目不敢視我謂爾勿憂爾亦勿自棄天既與爾足亦傅爾兩翅豈使長棲止終不履尺地二物聽我言若有矜奮意欲走苦不進欲飛還自墜願假東南風秣以玉山穗嶰谷有竒竹生彼深林幽伶倫逺見取遂中律吕求劒埋豐城土桐為㸑人收有聲響人耳有光干斗牛世謂雷蔡賢已非伶倫儔韞櫝終老死衒鬻遍九州白璧固不乏燕石價亦酬所以卞和氏不辭刖足憂党氏貞節詩松柏當盛夏蔚蔚淪等夷霜雪摧抑餘挺然表竒姿婦人主中饋無非亦無儀溫柔實其德父母戒無違吁嗟貞節名不幸乃見之党氏嫁七年夫死少艾時生兒在襁抱呱呱且啼飢當年罹閔凶晚節疇能知立志一以定世故寧或隨期頥見豐腆曽元列斑衣誰謂不幸中報效如蓍龜聲譽溢閭閈餘風淑澆漓寄言後來者悠久以為期送劉公佐御史任西臺都事偉哉造物心生賢端為國欲知國家盛臣輔視其德憲憲子劉子器大實天得昔年輟道山持憲出南紀柔剛迭用中德威真畏喜誠為器之鐵春得明道體古人久不作此道已如洗我生若恨晚猶喜及見此安得如公百參錯俾視履至正癸未春紹興總管兼善達公以禮幣招行鄉飲回至七里灘舟中同陳君王叔載鄭以道孫子材姪季武王敬中取山谷詩一江明月趂漁船之句為韻得一字禮成發會稽主送賓筵秩雪睛宿靄收諸峯春笋出舟下七里灘帆張如箭疾圓月正高懸極目天水一柔櫓和欵乃淨練破蕩潏真同泛剡情不羡乘槎術共載得才彥劇談夜連日史册三千年毫釐窮得失飲江酌北斗浩氣逾崒嵂兹遊不可忘後會那能必題越費氏飛流亭久愛越山勝晨喜春雪晴行訪香爐峯得憩飛流亭始知危石煉不補銀河傾長夏炎暑却終古風來驚高源束岩險竒觀類天成賦詠鬭雄辭窮搜雕元精水下比性善孟氏論已明志士達忠孝處難節乃名不見鏡湖水萬頃平無聲利劒一首贈人利劒出寶匣耿耿耀氷雪持入衛九重一指妖氛豁坐令海宇內奸邪不敢發願君勿小用鋒鍔亦易折題直齊陳氏詩卷鈎弦衆所職無庸事窮稽吾黨子證父微生鄰乞醯聖或有不許始得窺端倪中山陳氏子齊扁以直題君看岡上杉挺節青雲齊蔓草施中野屈曲叢終低惟人生本直不直逐物迷今愚詐絞訐異若穀與稊儻非敬義立詎免趨傍蹊送婁所性赴鄉試退之昔未遇光範書三上明復早為貧睢陽幾來往天固使不售學術要開廣婁君識既高理義得所養真腴在方冊大烹乃獨享春秋發其微一一如指掌文章爛五緯色正奪萬象連歲滯金淵罍洗混盆盎畜極今乃通餘子何能倣壬戌二月草九日與王良夫伯仲飲酒梨花之下約次山谷韻各賦一首世人品梨花為說何拘拘謂脫桃李繁未比寒梅疏豈知幻雪夜夜見蠅頭書室虛白逾生不厭相與娛朝遊姑射巔夕宴瑶池墟肌輕既飄飄襟清亦舒舒白石以為糧玉芝以為蔬高照倒影燭滿斟上池壺坐有王方平獨識我為徒送程仲章得體期大用薦不辱吾筆濟美世有人憲府流聲實書馳中臺辟傳乘入門驛聖世開太和治純用儒術賢路久已開禮羅亦云密才難自昔然拔十期得一君學明體用禮法嚴自律願言尊所聞使不虛此出會見真儒效杲杲如皎日送吳景賢憶我初識君邂逅錢塘樓文妍六橋水氣凌兩峯秋平生易賈董不數枚與鄒别去餘十年掾史來升州執㦸滯揚子蕭生抱關留但聞百事理不見有悔尤玉雪不磷緇塵外自浮遊果充崇臺貢千一乃為收清高贊憲府濟物心乃酬苗秀審芟殖寃洗澤乃流酌泉本素履名節光前修他年早拂衣相期釣滄洲送魯子亨魯君宦武昌舟發建鄴時朋友並集送所贈惟苦辭謂當戒食魚飲水操勿移伐木道久缺我幸今見兹君為時所賢徵辟書交馳名實久已昭義利分毫釐飲水云不貪世不皆隱之嗜魚云不廉胡乃有公儀何擇水與魚但問冝不冝君家魚頭公市飲不自欺當年在政府骨鯁生益知苐用君家法我言何能禆溉釡試烹魚定知不磷緇送戴與善客有戴與善家世今移居讀書不求官富貴浮雲如愛山事逺遊衡嶽至匡廬會稽探禹穴著論準潛夫平生景純術異人授異書擇地必與善葬法為世橅地善子生善始悟胎教疏食我既生後聖子詎移愚天命性既善地善配有餘使我此術行善人滿八區今年來鉛山為我言渠渠子行會有遇去去無停車贈孫友仁舟發甬水東遙望青山岑白雲既杳靄佳木亦蕭森下有寒棲士縆絃鳴清琴調古知音稀自聽還自吟飢食北山薇渴飲寒潭深持此永終日世塵詎能侵願言往從之庶以慰我心孫子隱泰山程子洛水涯山水得二子草木生華滋山水無終極二子名永垂斯人雖已逺踵武可尋追我學苦蕪廢君操我所竒君居青山麓我居南水湄無令千載後泯滅無聞知用韋蘇州韻送酒問彥實病風竹掃三徑終日無來客我友隔南浦無錢供藥石聊寄一尊酒慰此風雨夕何日能過門莓苔生履迹范得甫往昌國因寄馬雲北汨汨鄞江流赴海無時息我友滄海去逺訪安期迹東望久延佇煙波渺無極憑君一問訊早掛歸船席送陳録事今代録事官乃與令長同矧有會府壓更臨宣司崇兩造互請托黑白翻覆中常患掣其肘聽斷難為工耐軒太丘後民瘼實所恫平易以近民下情悉上通不求赫赫名保障以為功驚雷易失匕我心益從容所以豈弟政三年全始終耄倪逺走送遺愛思無窮代諸生壽王豈岩春月勝秋月三五初端正羣芳正含滋春陽尚冲靜人生禀兹氣清淨以為性豈但冨文史胸襟如玉瑩長松從澗底考槃發歌咏且盡一觴酒好月還如鏡晨興望鍾山層巒鬱深秀色留萬古青其體仁以壽寸雲雨千里禾黍膏以茂下有高隱士絃歌在巖竇學山期至山豈必雲出岫舉觴且勿辭鍾山以為壽蘇子鐵拄杖以壽張樂全倚杖撫銅狄謂與同清堅鐵杖豈為壽銷蝕同飛煙壽公無一物多祝亦空言公心在精舍不息如流川斯文天所相公壽無窮年安石恐不免淵明恨枯槁貧賤固難居富貴亦何好所以賢達士委命不離道羡公富學殖深藏以為寶退得資素封進無危機惱堂上奉兼珍客至尊為倒教子無他事絃誦夜連曉觴舉勿復辭樂事如公少猗猗堂前竹挺挺萬夫特直節干雲霄清氣氷雪積虛心類謙受歲寒不改色此君一何茂一一公所植堂上媚學子弦誦朝連夕切磋咏淇澳君子會林立公心在精舍見竹如公覿持酒起為壽何以酬盛德出門觀秦淮巨浸流洋洋盈盈晴空月墮此清夜光月遲自沉璧水駛拖練長並行不相悖道體一以彰門內齊居子習靜萬慮忘持此為公壽中有長生方粵從晉魏來嘉節尚重九愛此日月應世謂冝長久初度迫兹辰上壽冝公有今年兩九月九九分前後此名嘉復嘉瑞應端非偶去年八十一九九公已受今年八十二後九方為首備福無不冝儘可笑開口今年兩開筵痛飲黃花酒壽百六十二養老詢黃耉七言古詩長歌行大族簇漢書作族之琯初飛灰春氣早已回蘭梅主人召客延鄒枚夜永燭光熹炎炱瑶觴屢舉傾金罍主人盛年絶外猜幸與公鄰熟往來我性忤俗衆所咍公獨顧我青眼開我不祝公壽考鮐我不祝公家絫萬金位三台願公祖德厚自培君不見王氏庭前符三槐題臨川李教授盤居圖出山小草且勿論志回白日窮追奔燃犀徒興牛渚怪投膠不救黃河渾盤谷自謀固得宜難則可許仁未知盤居先生顔是希盤桓居貞以隨時必宫盤中亦已非抱關擊柝皆可為君不見江南丞相久無宅安上門監亦有祠金陵清凉寺尚存介甫遺像秋日與客遊宋丞相墓秋風著人已淒緊南山當户轉孤聳胡為幽憂坐自纒一上前坂望岡壟岡壟委蛇斷復連纍纍荒冢壓其巔問言昔日卿與相祇今泯滅隨寒煙買文譽已斫山石意欲功名示無極翻令後人得指數好醜毫釐不相匿可憐役役死聲利得尚如兹失無議古人志業元有在丈夫所歎非憔悴勸酒舉酒勸君君勿辭一年春好惟兹時風日暄暖啼黃鸝澄空紺碧飛遊絲緑楊萬縷垂水湄小桃破萼嬌晴姿今日何日風物竒花朝止有三日遲客愁頓釋如氷澌况有佳賓酒盈巵堂上主人文章師筆下縱橫蟠蛟螭胸中磊落載書詩年強學富仕則宜我生同里隔城埤束髮學校聨講帷在鄉已獲繼蕭規復來郎邑分臯比人生出處神所司千里會合非人為夷吾鮑叔心相知交情歲晚無磷緇禮長十年兄事之在我豈止肩當隨君顔美好我反衰自鏡醜惡知蒙倛君已有子紹裘箕我如鳩拙巢無枝譬彼平坂天馬馳跛鱉欲與爭毫釐上天生人意有期但貴樹植勿自隳弧矢昔已射四陲豈得懷土生愁噫郎山在眼水清漪魚有鯿鱖果棗梨勸君飲酒君勿辭坐上白日西南移司性之來郎邑勸酒一首君來溪柳未藏鴉君去開遍溪頭花一尊未盡相逢喜春色拋人去如此錢塘見君今十年豈知為客俱桐川我生緣無谷口田君亦未有買山錢世間萬事戒多取只此造物猶未許溪柳溪花尚惱人酒杯到手休嫌頻送趙子采赴都言各路立帝師堯舜廟趙侯嘬歜嗜駭俗開卷不作豎儒讀治道上下三千年得失照卜如龜燭太息者六笑賈傅八事為律輕主父每言論事在正本餘似牛毛何足數堯舜帝師萬事賴孔孟稱述何能外子孫世昧不可封祀絶不祠事為大宜令禮官郡立祠俾知報本有所思人臣致君必堯舜勛業未至非臯夔使民必為堯舜民共知孝弟徐行推刑措德洽俗自厚鳳凰覽德將來儀我言似迂衆所嗤正欲人心鎡其基淫祠廟塔遍天下大功大德祭乃隳氓之蚩蚩諂非鬼性善誑惑無由知皇元治具已畢張惟此未舉寧非虧泰定聖神方御極六甲肇子開昌期詔下四海求直言我今走陳無庸遲此行我言會有合坐令萬世長雍熙坐令萬世長雍熙我歸耕鑿老不辭今侯去去維其時且倒玉瓶鄞江湄送鄭有常學録歸括蒼釋之因宦減仲産叔敖相齊子負薪今人讀書賤此道得官乃欲醫賤貧賤貧有命何可醫徒令內熱守自隳鄭君三年録升校不辭俸薄兼官卑谷口為鄉無不可亦復好客如當時侵疆必歸書必刻學政所知無不為一杯輒歌寫清琴金石殷殷留林池有子讀書夜連曉從我問學窮毫釐不為乃翁坐此困但知固守為裘箕自君高曽擢科第官學雖顯生事微君家訓飭用何法子孫能爾承前徽白下衣冠送將歸使我停杯有所思我分堇荼甘如飴願言千里同襟期送李壽父赴崇德州提控案牘雪消新晴春水借舟發秦淮健如馬平生知已盡清流出郭送君空白下君家兄弟真無比不數當年有三李元方治行今第一過家上冢暫歸里肯令難弟離侍傍活人要出囊中方秋風不復動歸思得官正在鱸魚鄉陪王明府禱雨鎮山同諸友訪正氏隱居羲和行日當午停旱雲不雨空鞭霆扇搖無風腕欲脫六合為窑難逃形偶到君家非有意忽得水竹涵清泠解衣盤礴不忍去况有佳客來聨軿更喜主人能愛客枕簟招邀入林坰冰盤夏實雜水陸不覺牆角屢倒瓶可憐俗子走聲利紛紛有若蛾赴熒廣寒閬風豈有隔置身瀟爽由心扃送溧陽同知杜君正攝江寧令二月還任魯叟相事僅行攝國內大治消三月官無掣肘皆可為豈問趙魏與滕薛杜侯攝令兩月留撫字得民聲實流略用家法稱父母妙割游刃無雞牛彈琴戴星今孰優問誰能識陳太丘甲申送鄭榮卿都目得代歸桐汭憶我昔年教郎川得事邑宰王公賢公用絃歌化文法躬率縣曹來講筵鄭公時為公所器誦書炙輠方少年我歸敝廬既得謝君忽來官甬水邊乍見驚問始相識君鬢已白我皤然一别歲閲四十五論新道舊如目前僉憲又見王公子歎君尚淹心甚憐市舶幕長欣代去竟歸桐汭便著鞭犀珠磊落守船法三年不嫌無一錢家住三峯雨新過白酒黃雞秋正妍仕求稱職不在大任大責重憂所纒存心濟物亦易及日所為事可告天出處惟求兩無愧願君守此彌貞堅此别再見知何時病不得送徒悁悁我多故人在桐汭為言耕讀早歸田桐川三峯歌次劉教授韻秦漢海上求蓬萊方士一去不復回三山元只在人間蔽匿雲霧不為開萬騎南遊上秦望乃獨遺此何為哉此山迢遞東南來勢至桐汭為低徊三峯雄秀插天半下視培塿皆陪臺此山峩然如三皇初議制作陳尊罍此山澤民如三后調燮雨暘符三台或疑女媧煉色石補天功成遺餘材又疑張騫使河源歸囊梱載多竒瑰河流衝決流至此不爾何為洗濯瑩淨無塵埃使我有疑不能決欲語神怪非吾儕安得辨口如齊諧劉公胸中有丘壑酒酣筆下寫此磊塊懷我欲繼作豈其敵語險韻絶如懸崖送林叔瑜髯林三年客楚尾食其倜儻聊相似有時取酒聽其談抵掌掀髯殊可喜攜書挈劍别我去問言未遇且蓬纍未要上書自薦達也未鹿門攜妻子但謀祭竈請比鄰鬭雞走狗隨閭里我謂君言也大竒我亦起柂歸鄞水二月一日與王良夫飲潘子玉園見梅花新發與桃花爭妍再次前韻賦所怪物隨氣質性乃殊各守爾性非自拘梅開本與春風避下視桃李賤且疏忽逐桃開失其性有此怪事史宜書豈梅亦隨蕭艾化肯趂姿媚以相娛不思貞操獨秉太古初託根分在冰雪墟縱使孤高不為俗所趨丈人行尊意儘舒如士一旦改素節心已慕羶厭茹蔬使我長歌擊破壺梅兮名存非吾徒贈墨客林松泉李墨黃金兩相直世無潘谷誰解識林家得法亦有名試磨石堅光㸃漆我無論古垂不朽却愛此墨可傳久儻書自鬻牘三千何似珍藏七十九次道心六月六日雨韻歲六月首五月尾得雨如金寧是水今年六月六日雨隂雲周匝遍田里四明野客喜欲顛不道此間無我田寄食乞漿要得酒也應易度龍蛇年去年縣官免租簿夏秋苦旱春苦雨今年一飽斷可期流民已盡歸鄉土問余何事不歸家十年飄泊來天涯此日不歸歸便得不曽題柱要乘車建平邑庠堂後古梅久困斬伐同王明府賦槎牙堂後梅鬱鬱含早春託根已得所植兹泮水濱能愛此樹一何少斧斤斬伐從比鄰條梅已盡根幹存况此憔悴誰復珍我願爾為禹廟之梁勿作爨人之薪君不見爨人無知蔡雍死禹廟之梁為龍變化如鬼神能興雨澤霑時人代人送徹爾户將軍少學萬人敵書記姓名亦謾讀曽隨博望探河源逺將樓船從楊僕手提玉龍不顧身辛苦成功收爵祿天下至治息五兵今為君王護北平去年來戍郎水上秋毫不犯號令明身同甘苦士卒樂坐使境內消姦萌每得相從出射獵往往驅馳騁驍捷身輕一鳥草上飛弦響雙鴻手隨接衢歌野舞同醉醒日暮歸來心未愜瓜期忽及回桐川送車百兩聲喧闐津亭把酒别我去天寒積雪千山連何時合并有此樂離心翻繞風中旃與史祥叟别分和杜詩一首余得白鳬行君不見造物戲人如兒童遺爾百憂看成翁人生只同蟻旋磨擾擾誰能出其中行未萬里豈為别丈夫慎勿悲西東隂雲散盡日弄影明朝一棹隨春風乙未閏四月十日余宿東溪朱家得夢異甚覺而書之夢行溪上遇一翁方瞳白髮兩頰紅踞坐磐石䕃長松問之不答耳若聾余不敢退禮愈恭久之顧我言始雍笑指太白之高峯我將引汝遊其中余前謝翁惟翁從翁即前行如飄風山磴險絶杳莫通余怠憩坐氣如虹翁乃回視責我慵余復勉強行躘蹱漸見佳樹聳青葱石間流泉響淙淙謂翁此境已竒絶何必辛苦登高崇翁即笑我所志庸行行力倦憂心忡忽見地平岩玲瓏靈芝煜煜紫氣籠瓊林香靄雲溶溶樂聲逺聞鳴球鐘異香縹眇來虛空頃刻萬變難形容余乃感激前謝翁匪翁安得登此中翁復呼曰來汝童我因教汝汝聽聰用力憚勞無全功見小忘大道莫窮汝年甚少朂汝躬再拜受教復謝翁請以斯語銘心胸送余下山余别翁回首視之杳無蹤我言兹夢誠冥蒙書之以俟巫咸降安宰特開宴賞花分韻得杏字飄砌曉見風落梅灑簷夜聽雨催杏柳枝著水初垂垂梨花照窗方冏冏杖藜亦欲追少年酒杯不醉發深省大陶山色萬古春青眼相看還首肯上完顔僉事我聞麒麟與鳳凰舉世皆指為嘉祥又聞古今所共寶荆璆垂棘與夜光有則爭欲快先覩不識遺恨心倀倀我言此物雖足珍求其實用無毫芒上天生賢誠更竒尊主庇民邦乃昌達則伊周窮孔孟豈此數物可比方聲華煜煜東臯公攬轡澄清振臺綱明燭奸胥膽欲落仁風沾被蘇疲氓腐儒讀書守窮山欲見未遂徒倣徨攝敝衣冠見侯嬴傳拜牀下願聞一言針膏肓麟鳳珠璧縱不識此心滿足無所望送楊友直赴刑部主事君不見疾惡如風朱伯厚車如雞棲馬如狗又不見政無所避桓御史京師畏之行且止二公高節照千古曹李厭厭誰汝數上天為國篤生德清白吏後發友直平生讀書師伯起今却四知先盡已事不見人惟見理非即曰非是曰是嚴不為酷寬不弛二十餘年任風紀百鍊不作柔繞指恥為瓦全寧玉毁含沙射影從􅈮鬼道在終然直如矢彚征果見登君子君材豈止冝作士盡職春官亦如此送浙東帥閫都事宋公代滿還鄉廣平大節堅鐵石開元相業昭今昔子京修史筆扛鼎歐陽相推何敢易家聲奕葉久濟美篤生我公當盛世弱冠柔翰步玉堂卓犖不負讀書志石渠白虎講羣經持槖從容侍天子厭直承明佐雄藩南探禹穴觀海水文事武備際升平古來從軍本云樂萬竈貔貅我所監月淡秋城夜鳴柝威行九夷皮卉外仁宣七郡民社間置酒高會甘海錯拄笏爽氣看西山三年談笑了青油旄倪攀臥苦難留勿笑歸裝只舊書還作中朝第一流送金仲相赴建平幕橫山之西麻姑東平岡斷續如遊龍水出桐汭㑹白石郎步臨流邑其中桑麻沃野三萬户民俗儉朴無澆風讀書竹屋夜達旦諸老文會猶從容東巖賢宰力興學賤子倚席慚無功回首三紀事已非久聞凋敝多空窮四明金君儒飾吏三郡掾吏名聲隆案牘如山能立剖萬事不理須胡公撫字正賴用寬和流徙會見歸耕農縣幕得人我為喜已報交友馳書筒父老迎君如問我為言白首行龍鍾行春詞春來十日九日雨對酒十日九日愁有酒須快飲春晴須日遊君看當户桃昨日花蘂何嬌嬈今日衆蘂盡灼灼昨日開者已零落人無百年壽賤苦欲貴貧欲富世上得意能幾人坐令役役自苦辛赤松子王子喬神仙路邈不可招身在塵世誰能逃有酒須快飲春晴須日遊不飲不遊將何求朱顔緑鬢去不留送敬叔兄之建平城南城北花草香客子舉袂風揚揚黃塵蔽天車輪逺白日照地離草長孤鴻高翔避寒暑羣雀低飛謀稻梁兩渡吳江弄舟楫乾坤日月浮滄浪次季孟賓題趙伯畿仲元兄弟怡雲亭韻公子席珍久家食手不停披硯長濕門開簾捲即西湖湖上煙鬟作屏立復事幽討寄清豪山椒小築寧辭勞君家兄弟真聨璧怡怡杖屨來遊遨白雲千變是朝暮雲出雲歸似知處看雲隨人各有得怡悅既久同成趣更愛屋不礙雲山主人心與雲俱閒此心此屋俱是雲從人逺向雲外觀碧筒飲轉語一首注云六月二十二日同諸公為避暑飲臨荷池取荷為杯故名池上六月避暑飲池荷萬柄濯雲錦座客灑落無老兵盤羞錯陳輕侯鯖飲客但取荷為杯有客未許瓶恥罍豈但藕俾沈疴全也知花任真人眠原製衣裳人獨醒白戀鐺杓意乃冥黃流在中圭瓚盛玉露初下銅盤擎月華漾漾墜碧波天光耿耿明銀河滿盈如戒欹器偏古朴直想抔飲前願與下民針膏肓安得上池見壁牆事屬真宰有前定池未秋風且中聖聊爾為樂意勿有如荷盛酒不濕酒次王伯循御史冬十月韻枯梢無影月在地北風自語時為冬橘熟寒洲艘集賈稻棲南畝肩頳農江南薦灾尚寥落敗屋逃亡眼誰著繡衣御史天上來何當一使春意回倪侯守濠州泰定四年夏産瑞麥自一莖兩穗至五穗侯名顗字廷簡君不見貞觀十歲濠州野蠶成繭為唐瑞距今為歲六百八十九復産瑞麥一莖二穗至五穗泰定聖神方御極慎選守令司撫字兹州承宣實倪侯庶富而教心户至田里熙熙致氣和示此嘉祥見天意治先使民不饑寒蠶麥為瑞固同地不數朱草與靈芝肯比醴泉及連理漁陽之歌未足多陜虢所進差可擬唐叔得禾既云書所紀倪侯何不獻天子只恐功大心轉小却退祥瑞書災異送王正卿録事紹興録事昔為郡督郵今代所職城內令得人宜若陽道州撫字心勞是其政我知王君已十年廉公忠孝咸稱賢㑹稽趙范所過化風俗禮樂猶依然弦歌妙割無雞牛來莫真令有襦袴最是老叟識劉寵他日走送還如故壽東巖昔年嘗讀三星詩月宿南斗生退之子瞻之生還如斯二子所以踵武遙相追天之生公也太竒公生之辰復值兹學行節槩久自持不能諧俗亦類二子之所為建平之政我所知黑白是視勇奮揮豪右喘若竹筒吹精金百煉色不移願公益勵勿自疑但視二子在當時我亦日夜祝公富且貴氣勢要薦樊宗師正卿期分買山資壽趙中丞夾鍾初吹夏月季庚金伏火日涉二上相鍾兹清淑氣高材絶識生特異置諸臺端使宅揆萬事欲理問伯始繩直準平方圓至十道儀刑在兹視功名富貴非公志一夫不獲謂由已仁者必壽此其理一身五福宜俱備壽洪宣尉使節煌煌蒞江國闔郡歡迎走城驛此地實公舊所治郡人猶能誦公德重來回首二十年岸柳江梅有佳色政從一郡遍江南願早普為天下澤存心濟物天祈福長年富貴何須祝
