彚升正月十九日王舜玉贈詩次書其韻覊離千里逢初度轗軻半生縁我辰豈但松筠分霜雪也知桃李占陽春有錢沽酒從田父無術觀人充國賔塵世都非那有定一川鷗鷺自相親謝林閏之惠𤓰酒招其同飲尊酒乍開浮臘蟻田𤓰新剖瑩秋霜多愁漸覺心胸豁煩渴能令齒頰凉貴似邵侯難自保貧如陶令趣何長慇懃投贈無堪報幸子相過共一觴與李雲心宿通明堰作對酒不知身是客論詩轉覺意相親孔融下與襧衡友鮑叔多憐管仲貧一路迴風翻巨浪满天飛雪暗遥津他年若自當舟楫莫忘江湖未濟人王宰勸農覈田同留水北劭農不倦至村村老稚歡迎笑語諠漪水大巖禆翰墨野花幽草襯車轅樂聲逺共仁風暢旗影輕從愛日翻三載易過郎邑在心期留與後人論寄純齋真人太乙真人君絶似四明狂客我何如求君辟榖長生術抛我司空城旦書㑹看家家迎薊子不妨頓頓食鱸魚細㸔凡骨如堪換便欲相從結草廬有之近交純齋真人再次韻呈二公二子丹成乞所餘問余還可悟真如老人為照青藜杖劉向曾觀天禄書洞口時來休失路濠梁樂處定知魚三生也是賀狂客憐我黄塵困旅廬春雨自入春來宜得雨肯因遊子却敎晴早鶯已到林寒在吟客不來庭草生櫩外花飛誰共酌枕邊聲斷夢歸耕身自不歸歸便得一犂江上有誰争送海南吳廵撿棄官歸養官向海隅乗九折夢歸堂上奉兼珍久知忠孝為全節惟恨尊陽止一身功紀鼎彛無定日鬢添霜雪有慈親明朝起柂還西浙男子行藏不為人節婦汪氏前楚國樓公五世婦也早年嫠居饑寒困苦之極守志不渝教育其孤有歐母之風敬以詩美松勁梅清操不如風饕雪虐事尤殊食貧方念歐依鄭攜幼深憂范姓朱满篋藏書傳有業空機易粟任無襦寒饑失節亡家國羞殺人間説丈夫贈亷訪分司五首憲幕威嚴地位髙貪汚未見已魂銷繡衣直指風霜厲絲轡馳驅山岳摇玉尺直温知盛徳氷壺瑩徹見清標從今原隰咨諏徧趣入中朝珥漢貂江左溪山第一竒煌煌星使此分輝栁摇春路迎絲轡花燦晴原照繡衣豈樂鷹揚并虎視要令魚躍與鳶飛鐵冠白筆司天憲㑹見臺端便趣歸亷問奸貪膽自驚持平憲幕盛賢能光明可比照天燭清徹端如出壑氷不憚驅馳遍咨度久知聲實已飛騰共稱治獄多陰徳㑹見于公後代興清才憲幕貴璠璵寒露氷壺炯不如汚吏望風思解組威聲摇岳見登車一時豪猾心方畏千里饑疲氣少舒澤物洗寃儒者事此行端不負詩書星軺玉節下青㝠一道祥刑事豈輕白簡聲摇南紀動繡衣光照大江明褰帷盡見民間隠持法要為天下平自任洗寃今茂叔使華千古仰髙名代諸生壽王豈巖父仁齋今歲欣逢両初度留賔從此接長筵觴浮黄菊攙重九壽似南陽軼百年不問廣成傳道術自摩銅狄鬬清堅五湖豈待扁舟去大隠由來只市㕓不羡人間萬户侯素封無事不優遊今年壽過陳丞相通國人稱馬少游螺甲博山然永日菊花竹葉晏清秋有兒有學剛岩處文苑儒林傳定收一歳難逢兩誕辰只縁九九又從新平生積善王承事上坐宜推紫府君新酒香橙臨節序蒼顔白髪鬭精神如公備福今能幾後月休嫌舉酒頻年登九袠轉輕強積善由來望此鄉洛下同庚皆丙午人間佳節近重陽爐然沉水瑞雲吐酒汎落英秋露香誰鍊還丹真得道願公乞我長生方華髪從生臉要朱重添九九更堪娛衆賔稱壽須判醉明日登髙不用扶蘇子親觀鑄銅狄杜陵可笑把茱萸菊花因公兩初度得得籬邊未肯敷代諸生壽王豈巖髙才絶識真難比苦學清修孰與同豈但説詩勝匡鼎也知著論過王充千觥酒罄蒲萄緑萬朶燈敷菡萏紅吾道極天終不墜江東教思與無窮要須披腹有琅玕逺抱何庸與俗觀為善本期尋最樂讀書端不為求官元宵燈火歡聲沸上古春秋壽域寛料得如公百無慮一尊何惜侑清彈可行未達身寧處外見浮榮守肯遷豈待當歸全逺志從教甲子問疑年華燈夜半看齊放端月人間喜正圓九十椿庭傳鶴筭一杯家慶想欣然年歳如公仕正强肯將美玉但深藏何曾官職癡兒了豈似嚴君樂意長燈火漸開蓮萬朶賓朋為罄酒千觥慶門天衍詩書澤外傅孫添弟子行直與前修追逺業但令餘子仰髙風能成父志堯夫力克闡師傳元晦功樂善自宜躋上壽居間端不博三公春蟾初满花燈放豈惜開樽與客同家世誰知善是敦故宜有子大于門篇章神助昭雲漢經術師傳極本原照夕花燈連萬户近人圓月在清尊上奉椿庭幾九十讀書已下見諸孫春日郊行二首春來花栁惱人意日向川原至夕曛栁暗垂絲初著水花明野火欲燒雲馬行平原芳草地棹入晴川白鳥羣村中濁酒亦可醉林間麝香時一聞二月常年花尚遲今年二月已芳菲且携尊酒花前醉從教扁舟月下歸遊客最後折花去鳴蜂猶自逐人飛光陰一去不少駐早晚重來計莫違郊行秋郊勢見川原闢靜户聲聞草樹清村逺日斜歸艇急天青雲盡去鴻明李斯難出東門獵鄭子寧甘谷口耕世事悠悠行樂少杖藜今日未宜輕春溪送别一首呈國瑞知事雨長春溪送客舟一尊易盡客難留老參戎幕貧依舊歸過嚴灘得免羞取次岸花開不斷間關林鳥語相酬秋風籬菊期同採休羡班超定逺侯戊辰韓大雅自南臺掾史赴湖北憲司知事魏公勲爲四賢冠吏部文興八代衰誰似髙才輔家學肯留南紀滯明時秦淮烟水蘭舟發黄鶴梅花玉笛吹憲府清髙少公事休因崔顥不題詩送廵綽官汪仲罕知事還衢棘闈深向浙江開喜得三衢幕客來遶舍珮聲秋宛轉隔簾花影晚徘徊羣公共説青雲器丞相親分白玉杯遍寫新詩寄鄉里驛亭候吏莫相催辛酉六月二日壽趙迂軒學士海内蒼生心屬望朝端元老禮方隆共知貧似韓宣子未許閒如裴晉公竹葉清尊能却暑紅蓮白羽自摇風他年得謝身康健㑹入耆英保社中柱石邦家豈偶然貞元㑹合篤生賢掄才人實斗南一執法身爲天下先自是慈仁能備福不因導引得長年清溪九曲幽居勝他日耆英作畫傳潞國功名增耿介汾陽事業更文章試於今日聽清論誰得如公備福長壽酒满斟欣轉健斑衣戱舞愛成行清溪九曲仙凡隔水竹圍亭六月凉富貴功名不待言詩書禮樂子孫蕃歐曾制作無浮靡關洛推明極本原分陜三年有琴鶴移居九曲為溪園奉觴稱壽酡顔喜不惜頻開竹底尊天開昌運㑹明良崧嶽生賢任棟梁為相何曾數房杜致君直欲邁虞唐清溪九曲紅塵隔壽酒千觥白日長豈但階庭多綵戱已㸔朝罷笏盈牀累朝勲業見丹心經濟宏材冠古今愛士力扶名教重憂民惟恐吏文深希文心事千年在伯厚聲名十道欽他日清溪為緑野角巾强健足幽尋壽潘溪隐老子赤山桐水成真隐秦望錢塘想舊逰萬衆詞塲収勝㨗三朝宦業著聲猷主賓歡笑千觥酒松菊清妍满逕秋肘後有方應得力百年身健炯雙眸僕臥雪建平客舍起已卓午忽憶仁父宰公初度急走為壽歌鄙句以侑觴次日録呈爲他年重㑹一笑手推劉寵送行錢只取新詞換管絃酒接長筵先獻頌臘餘七日已添年鷁舟凍解行千里鳯詔春新下九天單父政成身始暇去年星駕稅桑田五言絶句次陳季綽漫興十首海内宗文體寧淹教一州未應如表聖那即賦宜休愛酒同元亮為文易子山方如六月息未許一身閒地僻便人懶時移動客情水流無凍跡禽語有春聲萬事難前定逃藏有醉鄉心情如老婦恥學少年妝已恨耕桑晚難徼筆硯靈從人誇詭遇何得背遺經匡濟非吾任淹留豈此心春來歸夢切夜夜繞山林文章真小技鏤畫俾形臞卜祝容司馬班超恥事儒世人矜少得失意即驚呼兹病為難治莊生是扁臾倦客懐農圃方知樂事濃林醪㑹鄰里社鼓響鼕鼕時方事誇奪君獨不隨人此意誰能識嗟嗟勿重陳六言絶句送衛真人暫歸茅山郎水沿流泛艇豐園倚榭題詩百年此樂有幾回首已覺堪思解賦石鼎雪車才如彌明劉义問君今歸何處笑指白雲吾家孤鶴遐踪矯矯馭風歸袖披披許我共餐昌歜五月五日期師題商學士為陳仲剛作澄江圖江南水濶天低目極波皛煙㣲閣老為誰肯寫玉堂有客思歸七言絶句題强𢎞之少府枯木竹石圖霜木棱棱踞盤石風篁嫋嫋摇清秋王孫落筆妙天下前輩不數文湖州題出洞羅漢圖羅漢相傳五百人人人渡海用精神應真事跡誰親見筆本龍眠自足珍潘伯勉以余得女見賀次韻謝之中歳有女差勝無他時得力知何如陶兒倘不喜紙筆班女或能成史書送客坂路威夷車百両晴花爛熳酒千觴野䳌似惜征人别岸栁不知離思長寄馮彦思一别馮君二十秋十書九説欲東遊為君准擬遊湖棹先入明州次越州寄俞季友子也才髙又妙年自宜獻賦上甘泉雍陽客舍多明月詩到春來有幾篇山雪都消水見沙滿城桃李欲開花青衫白髮東風裡南信初通倍憶家寄熊原翁自笑將軍不值錢學書學劍両茫然今朝却走豐城道回首横岡十九年江上書來慰舊逰新詩滿紙不勝愁篝燈照壁元無寐又聽疎鐘起寺樓志道齋前芹草春游思閣下桂華新滿頭白髮非前日祗有丹心向古人潛江孔陽不可見黄家湖頭君讀書不辭入邑扣齋閣徑買小舟歸釣魚寄宣生寄語宣生好讀書日長樓館小窓虚他時落筆生風雨何恨腰懸玉帶魚作家書寄方伯異三絶句曲尺塢中看止水雞籠尖上望遥天平生多少經邦策却與揚雄草太𤣥丹頰無光白髮繁朝朝騎馬入橋門誰知一片思鄉夢長在江南野水村侯家女欲嫁官人不料文章是告身何似癡呆田舍子春來耕餉自如賓寄莘生三絶莘也神清機事踈吟詩增瘦要人扶看來自是風蟬質肯作塵埃葉底枯念爾才名百未能只宜辛苦向書燈他年縱不成梁棟也勝空林掛樹籐去年筆勢喜翩翩將謂名駒不受鞭怪得近來無一字定應癡懶墮狂顛寄都水經歴月彦明并柬仲禮監丞三絶句遥望蓬萊海上山五雲樓閣在中間仙人借我三珠鶴海濶風髙去却還廟堂近日進阿衡四海謳歌荷聖明都水幙官才最盛定裁封事報河清行河使者幾時迴喜得平安近信來滿面黄埃休自歎潼關西去是烏臺寄鮑仲安客路新年風雨多歸心轉切奈愁何故人忽送梅花信裹飯相求意已過春入靈山草樹新種花繞屋不勝春飄零江海成何事强起裁詩謝故人十里溪山接郡城籃輿時作傍溪行城中塵土迷人目鄭子書堂滿意清宿回溪望守村寄朱延年竹邊兩讀寄來詩恨不臨風舉一巵十里溪山華屋近舟行淺水馬難騎碧樹朱樓一逕斜路人猶指省元家門前不着閒車馬石磴蒼苔翳落花逺樹重陰長似雨深山積潤易生雲短衣射虎成何事青竹題詩謾寄君寄令狐素行問政春深啼杜鵑渚湖風暖木蘭船梅花不寄江南信詩到於今又幾篇唐人病馬圖志存千里困覊縻此病奚官豈解醫翻恨不如羣馬舞銜盃自效太平時陽關圖輞川詩句龍眠畫畫出詩中腸斷聲疆域今窮天所覆出關還似入關情和史信父晚步西楚東吳倦去來客衣三歲化黄埃蒼煙翠木斜陽裏長憶田園杖策囘贈士峻峯但問我辰求富貴不憑天理定窮通憧憧舉世已成俗誰落簞瓢陋巷中江邊閒步秋花寂寂草芊芊野色團春帶薄煙蜀阜山前江岸側分明認得魏家船城上閒步城上寒梅白雪花城邊嫩栁黄金芽平林望盡意不盡囘首城西日欲斜萬里雲歸雨意醒城頭花草弄春晴欲歌風物無才思更約諸公載酒行春入園林意氣清花紅栁緑鬬新晴城頭望斷天涯路城外黄鶯一兩聲出池陽城南抵石門莊奉次可庭長老見貽韻芙蓉城下且徘徊天遣看山向此來最是曉雲知客意九峰一一為余開齊山積雪鴈初時更勝當年杜牧詩僕已水濵余木末日斜猶恨欠行遲山到石門那得路龍灣水倒注山根老禪袖却運斤手只使詩無斧鑿痕題髙彦敬青山白雲圖中州方岳岱為宗誰寫巍巍第一峰膚寸雲生雨天下何曾有意為乾封
