body:
  text: 畏齋集卷二元程端禮撰五言律詩春日年少逢春日歡呼喜欲狂隨人折花栁約伴釣池塘三十忽在眼萬愁摧我腸秖今春日至轉覺意茫茫送王季方入都美玉良金質忠臣孝子門才名推賈誼學行得何蕃胸次涵千古毫端吐萬言朔南從此别文酒會重論一夕夢與人賦詩得前四句因有所感遂足成之計世身何拙談經舌尚存三年從閣老一飯識君恩水竹溪邊碓山花舍後園老親頭雪白稚子候柴門次杜彦通韻送唐漢卿司丞得代歸燕學問涵天禄家聲著栢臺鹽車行峻坂驥足見髙材詩思㸔花去歸程伴鴈回會言民力困田里得眉開挽阮申之縣尹官淹六載久仁浹萬家深境絶石壕吏堂清單父琴云亡昧天意走哭見民心安得百元結令予淚不禁送項伯晉歸台之仙居泮水師經術侯門禮上賔霞城動歸興藜杖及新春住占神仙宅行知來往津君歸憑問訊吾亦此山人客中㸔月得吹字郎川今夜月客子獨㸔時光彩明纎末鄉關苦蔽虧驚烏難自定短笛且休吹漂泊疑非我尊前舞為誰滹沲有事滹沲古為川浸迄今蕭王氷渡急馮異飯恩深浪洶驚胡馬星摇見嶽岑同舟欣既濟得句慰歸心寄單幕王三通叟詩酒别離後寂寥今十年逢迎長自失衰晚復誰憐虎鼠遭時異龍猪得路偏故人輿論許風格稱紅蓮年少各輕别相望今兩翁聯吟無客與把酒待君同梁苑花陪雪隋隄鴈趂風坐尋南北意流落半生中諸將諸將威嚴少三軍部伍繁追求無隙地慟哭有千村天下歸仁政今朝仰至尊共傳寛大詔早晚到黎元寄王仲肅三首好在王經歴邦人說下車指麾清案牘談笑到詩書曉幕香迎馬春閨食薦魚大刀煩寄贈心折憶吾廬聞説西京學金源舊制存兩公違配享列坐失常尊藩府多才彦宫牆入討論勒銘須大手不朽在功言莫怪音書少雲中使到稀愁邊成悵望夢裏想容輝鐵騎通南徼江鴻困北飛濁醪聊自遣一醉解春衣寄張伯任羡殺羊羔酒城南吏隠家攒眉哦栁絮呵手㸔梅花官給桃花米鄰分薄荷茶誰憐山寨吏冷廟作官衙留飲城南寄漢翔諸君子盡以思親恨裁成寄逺詩墨濃多是淚語苦不勝悲桐影風清處楓林月上時向來迎送地經過幾相思丁丑正月四日縣尉陳子淵見招司理黄仲翬處士謝彦實州判葉敬常同㑹仲翬有作次韻二首老逢人日至喜見泰階平酒借衰顔渥梅欺素髪明惟知飲文字不復計盃行豈但燭頻繼兼煩僕屢更臈酒供春酌新詩換舊題巧聞禽語變黄見栁容齊遊但隨藜杖貧從乏褭蹏招邀話耕讀近在村東西睦士何聲伯管庫於鉛山友朋多言其才美余於歳暮方以得見為喜又惜其去作詩以送之讀經還讀律為吏本為儒管庫官能富大夫才豈無窮冬催日短朔吹吼枝枯誰念客衣薄忍令田園蕪歸鳥憐爾甚㣲細猶能有識知知尋舊巢處不失暮歸時飲啄樂終日依棲足一枝人生真爾媿役役竟何為丙午代人送頓尉九首職卑兼邑小之子獨聲名僧孺官誰羡張綱志欲行凉風關塞靜秋水江湖清塵土何曾浣還家尚濯纓作尉建平縣讀書郎水傍萬家開外户匹馬放斜陽渤海無佩犢沈猶慙飲羊三年為政促他日去思長黎老送迎熟君行獨嘆嗟此心無一寸遺徳及千家佳䜟符􅗌􅈃雄篇奏鏌鎁斯人未易識悃愊更無華前有王明府于今見頓公建平三十載清節兩人同雅量從忠厚髙才喜事功所存雖小異俱有古人風維舟張祖帳秋水色􅉿􅉿行李離南紀殊恩出北宸難忘前日政愁殺去思人摇落郊原静不堪回首頻建平頓縣尉善政返淳風四野牛羊被三年囹圄空何修能致此不欲是為功流俗輕吾輩真儒見此公三年郎水尉善政起疲民小邑淹黄綬髙名動紫宸满塗旗獵獵把盞酒頻頻雲路瞻佳士柴門任此身昔日頓夫子金沙䜟又成西風動行李北斗帶京城烏府摽孤映青驄㑹衆驚三年遺愛在回首一含情郎水三載尉又見送君行政事原儒術功名屬老成律回燕谷暖氷置玉壺清舟發金沙驛西臺聽一鳴念舊淮漢終然别風霜未肯休阮公渾得醉賈傳謾深愁白鴈來何莫黄柑美易求且隨辭越艇兼泛逐波鷗粗糲從吾賤金珠付汝求詩書江左客日月海東州城暗枝枝栁波明對對鷗舉杯時事改慘淡一登樓晚眺漠漠復溟溟魚龍氣吐成江風吹欲斷沙日暝還生逺著浦帆濕低連烟樹平滄浪垂釣者對此愜幽情新竹月地添竹影風林帶籜聲白非縁粉涴節本挾霜清未怯翠袖薄永偕朱鳯情何當老嶰谷也作黄鐘鳴大雲寺修竹藏低屋髙峰擁大雲深居無客至幽意與誰分梅蘂添僧臘苔痕寫梵文夜來山犬吠庭葉落紛紛挽靜齋邢公二首自獻河汾策言歸甫里居時危聞善善身潔去舒舒子弟教惟謹琴書樂有餘使公為將相較此謂何如昔有黄承事功歆紫府君今公縁賑恤戮力事耕耘獨行哀榮備諸郎仕學聞誰言天道逺報徳已殷勤送疊山書院山長吳嶼南徳不患孤立有鄰言豈欺故令酌泉後來奉餓夫祠節義存千古榮華止暫時人生無以異冺滅竟誰知次林敬與山長韻歸田無廢祀堂構有藏經此事真難紀何人與勒銘即山徴李渤投刃見庖丁泛泛隨時者何殊水上萍送王君實都事赴内臺御史久簡王祥孝兼思汲黯忠聖明無闕事繩糾趣居中風正一帆速霜清萬宇同從容前席問為述細民窮春雨日日春櫩雨飛飛不肯晴天方爲生物吾特阻遊情委砌花何重銜泥燕自輕猶驚夜來夢身在隴頭耕壽趙中丞迂軒為國生賢佐今朝孕上台清風儀十道鉅徳冠三臺酒帶荷香舉筵隨水曲開神仙公便是何處覔蓬萊今日生申甫熙朝位上公浮雲任舒卷喬嶽自尊崇豈弟膺多福神明簡大忠蘭臺中執法十道仰髙風壽判官吳大任二首十一月二日治平期第一通守職為難今日酌泉操從人解組㸔已同陽獨復未學隂能干㑹見臨雍拜何庸數李桓志士慕前修何曾與俗謀讀書三十乗種橘一千頭華炬明瑶席春蟾浸玉舟主人趣為具佳客為淹留代諸生壽王豈岩父仁齋燈火萬芙蕖賔歡罄百觚商巖遲相夢魯國獨真儒絃誦期成俗慎修為永圖紛紛求福者誰解適兹途五言排律送陳希靜四明學官任满三十韻賤子東歸日陳侯北上時盍簪寧恨晚傾葢已相知徳似太丘長文如右拾遺鳯飛離丹穴鵬徙志天池久抱一鳴願殊愆六月期江湖成汗漫歳月委班資賦擬天台作山㸔赤堇竒鄭䖍官固冷鄧禹志非卑久矣文風墜嗟哉士習移渠渠空夏屋瑣瑣競刀錐子弟多無賴典型誰復師斯文終未䘮識者有餘悲輿論歸常衮諸生得翼之大鏞從扣擊𢎞璧敢瑕疵端使驕吝失真難世俗窺量同黄叔度權避庾元規門有問竒客書無乞米辭琴從子期聽吟和敬輿詩管邴誰云逺陳雷豈過斯風霜雙鬢改薪水一童羸寂寞人難處迢遥志自夷京城連北斗心跡滯南陲落木仍多感驪駒動去思衣冠塞郭出舟楫與風宜仲舉志仍在元龍氣未衰才猷從此展富貴恐難辭志豈關榮悴名期不磷緇顧余誠淺薄揆分合棲遲騏驥方開道駑駘敢共馳直當三舍退何止兩交綏挽倪濟亭我返草廬日君開花逕時坐盈文舉客筆快正平思弱蘂扶丹架圓荷颭碧漪按歌禽自舞行酒客忘疲樂飲心無醉終筵禮不虧當時勤置驛子美共襟期髙墅且賔主謝墩從去來隠㕓居甫定賦鵩䜟先知風颯銘旌逺雲低宰木滋空餘行樂地遊客有餘悲挽李徳甫宣慰干莫為時寳璵璠比徳温班資安序進名實致孤騫賑恤明荒政弦歌正化源親民勞撫字敬獄務平反閫寄七州重官踰五馬尊門閭宜寖大蘭玉已先繁束帛行加璧從珍方乞言輕彊踏泉石休致樂丘園有夢俄呼起無香可返魂哲人嗟殄瘁通國淚潺湲次浙東宣帥府開閫楊外郎韻聖世車書混仁涵覆載中大酺歡郡國重譯走蠻戎航海南金重堆盤火齊紅懐柔深悦服智術豈牢籠威震秋霜凛思施愛日烘鴈猶違肅殺葵亦仰曈曨海右三韓外江南兩浙東漁商輕稼穡鱻薧等菁菘弦誦今猶盛衣冠昔所崇帆檣千里集洲嶼萬家叢人固多豪傑材非但箭筒太平興禮樂武備飭刀弓閫寄軍民重權兼節制隆令行瓴建水境拓柱標銅跡息鯨鯢怪聲收風水渢祝融猶效職龍伯欲移宫久似星環北無勞檄喻蒙麗譙新畫角儀羽絢華蟲品秩參台鼎耆英出陛楓律身繩正木察物鑑懸空不擾惟持重原初毎慮終掾曹當代選才彦一時同銛利鉶新刃調和絲應桐文書知已簡談笑樂何窮言事方捫蝨揮絃復送鴻陸遊首鄞鄮水泛即瀛蓬島夐仙靈託窓開日月通霞城人境異台嶺客心忡橋滑足難躡泉驚耳願聾穴傳藏夏后鼓説殷靊霳秦望碑銘古蘭亭筆札工西堂池草句百里藕花篷鴈蕩長雲羃龍湫自雨濛鼎湖驚屹石瀑布瀉流虹羊角排山岫龍鬚比隰葒石靈歸洛子柯爛遇棊童太末垂名舊徐王布德洪雙溪吟已絶四井論非公牧去思黄氏遊來記葛翁江山遺跡在田里屬年豐勝極詩添興清豪酒有功夜舟蟾皛皛春履草芃芃爲趂宣風便寧虧報國忠下看文法吏相逺馬牛風布韈遊方始蒲輪召莫匆愛山生似渴吞海覺難充遇異歸休念聞竒訪必躬新遊呼賤子一起豁昬矇顧我材無取登髙志頗雄諸公如授簡㑹使剡籐穹挽楊處士上饒楊處士名自孝親聞濟險婁師徳躬行萬石君貸饑頻折劵教族總能文重肉因賔客荒田必自分倚樓從白首送子上青雲迎養人俱羡平反色始欣㸔山飡爽氣遺世絶塵氛君死無可憾名章已勒墳壽趙平章六月初三日太平端有象生哲應昌期學究天人際才兼文武資誠心開白日直節比朱絲居有詩書樂行無琴鶴隨周程傳道𣲖韓栁譲文詞動靜心能定毫釐事不疑人材深愛惜民瘼極憂思霜雪威從至松筠色莫移累朝承寵渥百辟則威儀先見同蓍蔡元勲勒鼎彛秉鈞參上衮執憲長中司暫出均勞佚行歸副倚毗福綏耆壽俊千載佐雍熙七言律詩丁酉閏臘留杭歸别范史二兄久客道逺日月促窮冬雨雪天地愁漢廷誰薦相如賦客路空餘季子裘鴟鳶低飛各有獲鴻鵠逺舉將何求世事濩落類雲變離心浩蕩隨江流次陸紹賢客中九日次子美韻多愁休倚酒杯寛強飲難成笑語歡短髪已如歸漢節少年空好切雲冠霜前白鴈能隨暖籬下黄花巧耐寒客路秋光元不異與君寂寞兩相㸔奉題袁御史餞行詩卷洗寃善政浙東聞卧雪家聲世所敦共説范公宜御史還思洛士俟昌言鐵冠雄峻權無撓栢府清髙事不煩仕宦豈須為宰相太㣲執法一星尊迎袁御史歸自南遷虐下專權孰此容满朝切齒未渠攻直臣曾借上方劍鐵漢今聞運判鐘四罪既誅果刑措萬邦咸悦已時雍髙名竹簡垂千古聖主金甌覆九重壬寅孟春有之劉君來自金壇示我佳章因次韻叙客懐以謝劉子清才過慶餘乞余佳句錦難如春風且醉新豐酒異日看成太史書不知我署見牽馬莫為人欺輟舍魚此意除君誰盡識男兒休歎老田廬食蕨猶言不願餘家貧未與古人如陶公歸去多憑酒虞子愁來始著書春老閒門驚入燕雨過南浦見生魚黄塵眯目客衣化千里江山空屋廬休與人爭腐鼠餘百年得失定何如浣衣應濯三江水行世寧銷半句書豈但守株難得兎也知縁木止求魚買山錢待何時足蚤駕柴車返舊廬春日欹枕雨聲收碧甃倚闌花氣襲羅衣海棠满院燕初到芳草連天人未歸時序風光還似舊物情客意毎相違便携樽酒尋遊伴休向空庭怨落暉初驚春風動江國又見春光生客愁花蘂迎晴欲灼爍栁條映日弄輕柔遥遥有客聯遊騎脉脉無言獨倚樓一片閒情何處寄有時吹笛落滄洲休言草木是無情自入春來緑已成却笑羈棲何得似故教終日恨難平有時楊栁樓前立復向櫻桃樹底行萬事浮雲那有定一杯春酒未宜輕舟次小直沽寄覃懐諸君子東郭棲遲雪照簷陌頭楊栁復纎纎惡懐思與諸