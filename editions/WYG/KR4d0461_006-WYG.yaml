body:
  text: 畏齋集卷六元程端禮撰跋跋泰山圖古人皆有讀書之地唯泰山安定徂徠三人見於圖畫者豈非以徳與其功哉三人學行聞天下宋自三人者出天下學者始知有師春秋汨於傳注久矣自三人闢其曲說學春秋者始知有經宜其名與泰山相高而宗仰之無巳也嗚呼盛哉跋陳象賢竹素園古今藏書者多矣金匱石室朝廷之藏也壁經冡紀季世之藏也牙籖玉軸富貴之藏也朝廷之藏與國久近季世之藏與時盛衰富貴之藏徒為珎玩若歐陽子之萬卷子朱子擬之則士大夫之藏也夫窮鄉晚學無書可讀無師可質見聞褊狹識趣汚下雖良才不能有成故書不可以不藏藏不可以不博藏之博讀之博又自博而約諸巳斯可以弗畔已所貴乎士大夫藏者良以此也然而士大夫之藏常病其力無以聚之力能聚之又常病其傳之不久其身僅讀而其子若孫懵不識所以至為鼪鼠之穴窻壁甕缶覆蓋之需者衆矣余原其故身既享稽古之力位為公卿名滿天下榮其生者過盛則貽其後者無聞是皆天運乘除代謝之理雖君子或弗能免况其所為獲罪於天者哉陳君仲模亦為藏書之室其子象賢獨能守而讀之不負其所藏蓋仲模之生隠徳弗耀其藴諸巳者厚而施諸世者薄宜其傳之未艾也象賢勉乎哉吾知天意之有在也說蘭谷說蘭臭香見易繫辭傳春秋内傳其久固可佩見禮離騷其生隠谷見孔子琴操序自山續斷竊蘭以惑世也世之識蘭者絶少黄魯直且不免况餘子乎子朱子援本草注騷曰蘭與澤蘭相似生水傍紫莖赤節高四五尺緑葉光澤尖長有岐隂小紫華紅白色而香是則可佩與離騷合按水出通川為谷今謂生水傍是蘭生隠谷與琴操合自朱子之說行世始識蘭矣都事石侯景元以蘭谷名齋其志於自修可知巳嗟夫六經自程子朱子出一祛漢儒傳注之惑士之自修者始識至善之所在是山續斷不足以惑而人識蘭也士之為善於巳所獨知之地是蘭之在谷不為無人而不芳也士之獨善必可以兼善是蘭佩焉而不芳者無有也士知為善而巳用不用不知也蘭知在谷而巳佩不佩不知也蘭谷之說不既盡矣乎景元徴辭於余請以是輔其志儒吏說儒為學者之稱吏則仕之名也名二而道一也儒其體吏其用也學古入官古之制也臯䕫稷契伊傅周召無儒吏之名而無非儒吏之實周官九兩始曰儒曰吏亦因其得民以道與治而言之耳自李斯嚴是古非今之禁一以吏為師儒吏雖分而道法裂蕭曺以秦吏相漢至趙張而文法弊極矣漢非不知用儒以救之也有一董仲舒不能用所用者不過章句儒嗚呼章句儒與文法吏其弊等耳兒寛儒也能以儒術飾吏事當時稱之飾之為言不過以儒術為吏事之文飾而巳若曰飾之而巳雖以湯之深文舞法巳能鄉上意取博士弟子補廷尉吏傳大義決大獄矣奚俟於寛哉其後薛貢韋匡之迭相終無以收儒吏之實效可勝嘆哉天開文運聖朝自許文正公得朱子之學以光輔世祖皇帝天下學者始知讀朱子所釋之經知真儒實學之所在然則士生今日者可不自知其幸歟誠能讀其書而真修實踐焉以儒術而行吏事於從政乎何有若於此猶或以語言文字求之而無自得之實一旦見案牘之嚴密其能不疑為政之道在彼而不在此者幾希子夏曰仕而優則學學而優則仕然則儒吏果二道而有所輕重於其間哉泰山張孟周以儒生推擇為路吏余謂路吏古諸侯之士也豈輕也哉作儒吏說以贈之順遷說一首遺章生番陽章氏子克巳父令其舍刀筆而為儒學于江東精舍知自奮勵呻吟簡編夙夜勤苦比年素食身臞且病問之則曰曩嘗以身三年茹素盟于佛以禱母病今母病愈茹素未三年弗敢渝也余曰人之所以靈于物者以其能推也釋推之為義者曰順遷也今爾母病而禱是孝于以動心也茹素三年是口之于味不能動而忍性也盟佛而不敢渝是畏神明而戒慎恐懼也皆其良心之所發不謂之善不可也今學于儒而猶守是焉則未盡善也爾其資飲食以裨勤苦力所學以慰父心雖曰渝佛盟而實順遷其所謂動心忍性戒慎恐懼者耳曰順遷奈何曰順其母病而禱之心而遷以孝其親凡立身揚名以顯父母者無不為也順其茹素三年而遷以敬其身凡從欲以傷父母遺體者為終身之戒也順其盟佛而不敢渝之心遷而為暗室之不欺明理之即天獲罪之無禱福善禍淫非鬼神之得司也非使之渝佛盟而渝其所謂動心忍性戒慎恐懼也順而遷之以至于盡云爾爾其勉之曰唯余既喜其志見今世咸知夷鬼是畏而知畏聖言以事天者少也故并書其說以遺之王元實字說㑹稽王元實名華祖字元實求余發其義以自朂昔年見元實受學余友黄君彦實亟稱元實讀書敏下筆霈然宜其所得巳深顧余何言元實請不巳告之曰士之為學惟實是務而已華實之效實斯華矣華非所致力也何謂實是務古之教者小學曰恒視毋誑曰請肄簡諒曰敦行孝弟實若易然也大學曰物格而後知至知至而後意誠實又有未易言者蓋求理一之理而實之易也求分殊之理而實之難也故曰不明乎善不誠乎身於是有存養省察之功一言一行純乎天理念念相續勉勉循循自日月至焉以至三月不違賢希聖聖希天而后為極致也使有一毫人欲間之則不誠無物矣烏能實何謂華非所致力一言之實一言之華也一行之實一行之華也得善服膺勿失孔門獨稱好學顔子之實而華也與太極合徳萬世受罔極之恩孔子之實而華也和順積中而英華發外剛健篤實而輝光也故曰華非所致力也昔司馬君實天資粹美學主乎誠程子語之以窮理而不能用邵子以腳踏實地九分人許之教門人劉器之俾自不妄語始器之力行士年而始成二公勲烈名節照映史册可傳可法此皆元實所熟聞者第書以塞請云爾余謂塞請而裨於致力雖贅且凟無傷也箴杜氏知能來請字余以叔良字之而為之箴惟人之生形性隂陽仁義之心曰惟其良其良伊何善之本然曰知曰能一出於天始自孩提巳知愛親長知敬兄義因乎仁良知良能孟氏發之謂不學慮而能而知擴而充之萬善可行火然泉達天之所命去為庶民存則君子所謂大人以不失此衆人蚩蚩孰無是心放不知求乃獸乃禽此心未發敬以存之迨其發也敬以察之必由勉行以至安行勉勉行行聖賢是程杜氏叔良知能其名我作兹箴以朂其成畏齋箴恐懼修省嚴恭寅畏夙興夜寐克巳復禮罔不惟畏弗畏入畏莫見乎隠十目所視莫顯乎微十手所指毋貳爾心上帝臨汝銘守拙齋銘憲使高公以守拙名齋鄞程端禮為之銘曰知及仁守聖訓昭垂守拙歸田陶氏之辭拙非成徳守奚取斯世降而偷巧偽日滋子當死孝求生乃虧臣當死忠求生乃隳機變無恥皆巧之為龍逢比干申生伯竒節以拙完巧者所嗤巧令木訥鮮近在兹為徳為賊燕越其馳惟巧似智與知逺而惟拙非仁成仁所資拙如寗愚聖猶取之顯允高公為時羽儀南服持憲大邦秉麾迺以守拙扁室之私實徳流芳本是以推淋漓墨妙百世是貽有泚憸人視此銘詩存心堂銘天心孔仁篤生我人全付天心俾主人身方寸之中萬理畢備體全用大實參天地氣機所乘危動難安一刻弗存思失其官雖視雖聴弗見弗聞役於耳目私慾糾紛秦越肥瘠藩籬爾汝嗚呼不仁如病痿痺心學之傳惟曰存存其存之方曰敬入門細微雜亂于察其放虚閒静一于以致養天不在天於予中居凡此百體孰敢侮予番易高君世儒其醫存心名堂是警是治宜其所濟仁聲四馳我輔其志揭此銘詩求放心齋銘寧夏神保生治書室於家庭之内題其額曰求放心余為之銘曰馬縱而逸鷹縱而飛不逸不飛維紲與鞿人心易縱㨗甚鷹馬何以制之操而勿捨操之之要念茲敬茲酬酢萬變聖賢我師明窻之下風日清晏圖書几研頃刻無間是故學者必求放心孟氏有訓朂哉徳臨寸草心堂銘里人齊元幼孤事母以孝稱名其堂曰寸草心余為之銘曰惟人之生得天地心守之以信發之以仁惟仁之施自孝親始堯舜克充光于四海𦕈彼寸草其生則同洋洋春榮偉哉化工我身如草親恩如天報天之恩何有既焉非天曷生非親曷保豈人有心不如寸草嘻伯善父奉親肯堂徴名孟詩余銘不忘懶懶齋銘為雍胡君質作富貴利達舉世畢趨蟻慕蛾赴馬瘏僕痡於茲退怯懶者誰歟可求有益執鞭為已惟不可求曲肱隠几曰惟懶懶所以存存大閑不踰棲遲衡門苦齋銘余與汪務能讀書建徳學余以朱子小人惟思甜者君子惟思苦者之語書于壁以自警務能臨别請歸以苦名其讀書之齋而余為之銘以發其義銘曰嗟世之人匪甜無慕匪苦無惡君子反是豈曰異趣苦外無甜孰謂之苦其甜實苦甜將焉取荼甘如薺義陳于詩苓名大苦醫師所知豈惟在口耳目四肢誘我皆甜其機甚危克復之功在審于斯菜根是甘百事可為我約我樂不我淫移嗜飴如兒近憂弗思名壞行隳時去志違枯落徒悲小人之歸商苦于行千金在箱農苦于耕秋穀乃登士苦于學拂亂困横動心忍性不能乃能仁熟義精學道大成汪氏子増齋以苦名我輔其志用揭茲銘存存齋銘為雲中趙去疾作性與天道夫子罕言于易乃言成性存存惟性之成天與其全知禮畢具無異愚賢心統性情性體惟静心乘氣機存之斯正曰惟存心所以存性其方伊何在乎主敬其效伊何動静皆定無間無雜始曰存存虚閒静一細微糾紛弗謹弗養千里其奔勉强安行聖賢是分效天法地道義之門行狀故中奉大夫淛東道宣慰都元帥兼蘄縣翼上萬户府諤勒哲圖公行狀曾祖濟古爾管領河南等路軍民扎木齊達嚕噶齊祖莽賚巴哈懐逺大將軍益都路萬户府達嚕噶齊父扎哈岱昭武大將軍蘄縣翼上萬户府達嚕噶齊公諱諤勒哲圖世為圖伯特氏世居燕山曾祖濟古爾平回回河西金源從祖阿穆蘭擒獲李坦父扎哈岱討黄花楊震龍等叛亂功業益著公㓜孤自知讀書稍識禮節暇日習弓馬不樂嬉戱知老成人比長稍渉獵經史博通武經将傳百氏之學時宗子卒無後宗族僉曰宗子死無後若當承澤盍益年圖之公正色曰欺可乎延祐庚申欽受符命授懐逺大將軍蘄縣翼上萬户府達嚕噶齊涖政之初諮訪舊弊號令有條備防有法人無攘奪郡邑安集軍民悦服奉檄鎮海口有功天子賜以金織文對衣二襲越六年加定逺巳巳徽泰翼萬户田特爾格子安圗與其兄珙争襲安圖匿其符命有司不能直者十有五年省檄公覈其事公燭其奸狀詰之曰汝均庶子也襲當以長欲誣以嫡而奪之可乎遂輸服而出符命人咸服公若神明焉初倭冦來鄞防禦之官控御無度且啟肆慝焚屋廬剽玉帛民甚患之公鎮遏嚴師控制貿易持平表之以廉介懷之以恩威乃俛首讋服恭效貢輸之禮嘗中夜倭奴四十餘人擐甲操兵乘汐入港公亟訊之得變狀徴所賂上官金還之倭旋及昌國北界擄商貨十有四掠民財百三十家渡其子女拘能舟者役之餘氓犇竄公亟駕巨艦追之進其酋長諭之曰曩不軌在律無赦聖上仁慈不忍殄殱汝敢怙終復肆蠆毒汝亟用吾命幸寛貸之稍予遲違則汝無遺類矣皆股栗戰恐願盡還所掠以贖罪公從之遂招徠其民給衣食使之保聚皆兩舉手環公拜且泣曰吾父母也其州牧徐敬率民立祠銘其徳于石歲嘗旱疫民不聊生公禱雨輙應時達官有掠買其男女以歸者公要於路讓之曰爾當閫寄政令不修民罹灾害尚忍奴人之子女乎遂盡歸其父母至元戊寅詔㫖許官屬侍親公投章歸養海冦竊發商賈不能懋遷明年還躬率精銳水陸並進浙江閩海之間擒獲甚衆漳州李志甫叛亂公統軍深入耀兵夾攻元惡授首俾脅從之民納戈甲復業者衆行軍所過秋毫無犯雖暴風疾雨卒徒莫敢避至元庚辰丁内艱是年冬十一月奉柩合葬于興和之宣平野狐嶺之原時海宼復乘隙猖獗粮艘多被殺間有脫歸者言賊聞小萬户來歸莫不相顧失色禱諸神願無與遇常覘公出處為之聚散也主􅒩萬户和斯嘉議聞之驚歎不巳遂狀申于省部公還具舟楫利兵戈整部伍戒嚴海上遇渠魁周麻千等于韭山之南大縱追逐親飼艫卒飯使破浪疾進幾至舟覆身溺者屢直抵流求國界及之遂全獲初浮筏下令曰凡脅從者歸吾筏歸者若干皆釋其罪凡所有金珠楮幣之物戒之曰此不利之貨勿取之悉沉於海至正癸未上遣賜上尊旨酒金龍紫段以旌異之定海連諸蕃夷商越賈颿檣凑集為要害之地分鎮行營無次止之所公為度地僦工剏置大府誰樓營舍凡二千餘楹於是鎮治有所保障有蔽粟有高積兵有深藏士卒吏屬各有寧宇其規模可謂宏逺矣臺憲省府交章薦之于朝至正甲申拜淛東道宣慰使都元帥加中大夫兼前職臨政三月民瘼盡察百廢具舉善政畢行有若役法不能定者均之官債無以償者蠲之吏胥卒徒之濫和買和雇之害皆懲革之行鄉飲以敦禮讓之風興水利以重民食之本朔望親臨學校勉勵奬勸事無大小罔不治七郡僚屬畏威懐德斁政苛刑不禁而止風俗為之丕變公事親至孝躬扶綵輿逰戲于庭欲親之喜疾則嘗藥膝行以進殯則肩輿擗踊以前少時嘗夜讀書婢入白事輙叱去娶必三十而媵妾卒不納平居未始言無益事非談兵則論道飲酒未嘗至醉夜必三起以勞筋骨日或静坐以銷念慮律令既嚴賞罰必信古今陳法訓練便㨗士卒整肅而有餘勇少壯者教以百工之藝凡革木金鐵器械自裁制度極于精利以裕財力每出入從者十餘人凡竹頭木屑敝屣荆棘之類必使荷以歸各適用無遺棄其謀畧機權皆不在古名將下忽遘疾踰月疾革乃撤藥物屏妻子沐浴更衣端坐瞑目而逝時猶聞忠國之言至正四年七月二日也年四十有六嗚呼公將大有為以慰民望奈何天不慗遺士夫軍民巷哭悲悼如䘮父母屬邑樹碑以旌其功立祠以妥其靈或繪像以祠者或陳詞立廟者非有徳於民其何致多慕思若是耶公質氣剛正風儀峻潔徳足以服人才足以幹事廉足以律已明足以燭姦是以貨財不能移其心志聲色不能悅其耳目有罪者雖親者弗釋有過者能改必録恤罷弱則愛之如子弟疾姦宄則視之如仇讐旌麾所指童叟歡呼觀者如堵奪攘矯虔者聞風消沮是以樵安于山農安于野漁安于海商賈安于市其有功于民不可勝紀厯仕二十五年始終若一日其愛國愛民之徳禦灾捍患之功淪於人心故隨處樹碑以頌之有曰不艾而威不敵而武䰻不易罟農安其畝倭弗來過海亦不波油油膴膴物阜俗和者有曰公匪徒武善禦善撫國有干城民有父母者又有曰威若嚴師愛若嚴父不虐困窮不畏强禦者雖古賢哲無是過也觀其操縱出處豈庸人所可識哉娶扎拉爾氏温州路達嚕噶齊必里克圗女封范陽郡夫人子男一人衮噶喇錫女一人達爾瑪錫哩適真定翼上萬户府達嚕噶齊僧保子普賢努惟公之功績節行世所共知顧夫碑記銘誄不可無徴端禮居是邦知公顛末最詳謹録所聞以俟采擇萬一程端禮謹狀墓誌銘元故贈中順大夫兵部侍郎郭公墓誌銘至正四年春公之長子好仁副使浙東宣慰一年徳政孚于七郡人頌其美則曰兹皆先人之教好仁兢兢弗忘圖免於戾焉耳惟是墓碑未刻雖曰有待懼久而湮以重不孝因出公行實請銘于四明程端禮辭不獲命謹序而銘之公諱璡字某姓郭氏世為徳州徳平人自高曾而上仕隱不同皆以躬行徳義稱于鄉祖源當金之季不仕以詩酒自娛考實性資剛毅齊家有法騎射絶人當路薦于朝授懷仁鎮巡檢蒞職未幾盗賊屏跡未及遷職而卒妣賈氏公幼而頴異五六歲莊重如成人讀書日記數百言至老手不釋卷窮理修身動遵禮法持家應門親族鄉黨情文隆殺悉有條理時當皇元混一之初法制尚簡仕途方開凡進取者無不如意奔競成俗公獨恬然里居優游卒歲親友或勸以干禄公笑而答曰吾知為善而巳禄可干乎公事親孝朋友非徳不交若志同道合久而益敬其在鄉黨平心應物人有争競必質於公析之以理無不釋然而退尤好施與家不甚豐而急於濟人病必饋藥貧必賑粟賴以全活者甚衆諸子長而仕進家庭燕語未嘗一日不以公忠清白為訓常曰朝廷設官分職養以重禄仕者本欲榮親若貪以敗官為辱巳甚何榮之有吾平生所見多矣凡居官倚勢作威瘠人肥巳雖累家資至鉅萬而覆敗不旋踵者皆是爾曺戒之諸子敬聴確守所至為政皆著名實厯厯可紀由公教之之篤也至大四年三月某日卒於正寢享年五十有八葬徳州徳平東北盤城長魁鄉之原至順元年追贈奉議大夫工部郎中驍騎尉太原縣子至元六年加贈中順大夫兵部侍郎娶李氏淑徳懿範稱于族姻初封平原縣君進封太原郡君後公十八年而卒子男三長好仁由中書省掾累遷中順大夫浙東道宣慰副使次好義東平等處管民提舉次好禮終於承事郎山東鹽運司高家港塲使令女四適趙某劉某梁某賈某皆士族孫男四繼善部譯史擇善奉訓大夫宣政運判官維善蒙古國學生餘㓜孫女六長適開封院主簿閔克禮次適樞密掾史王思道次適户部書冩李善餘在室嗚呼公讀書為明誠之學所謂為善亦曰為其理之所當為而止耳非若世之利其報而為之也利其報而為善則其心巳不誠不誠人且不可欺天可欺而責其報乎今公之子孫奕葉簪組駸駸三槐五桂之盛忠孝廉公顯聞中外善繼公志兹曰不忘而褒贈之典賁之泉壤君子行義達道隠居求志道一而非二用舍行藏曰有義命惟公道行諸身施於家以及其鄉里自任既重宜終身之樂此肯干禄而枉巳公墓我銘昭示無止元故處士倪君墓誌銘倪君濟亨卒以至元二年八月甲申葬其孤可明請銘君諱天澤其先寛顯漢若水在唐有聞曽大父居正大父文珣父敬之俱隠徳不仕君丱歲侍父自慶元定海之清泉徙居於路之子城西君天資清淑㓜受父兄教知自飭勵長益温恭重厚處善循理以孝弟稱人以急難求焉者視義所宜奮然捐財力援之一不自惜重然諾踐言不後時刻讀書有才畧路府屢舉薦輙謝不就曰吾慕仲長統卜居清曠以自娛爾仕非所急也北城有竹墅高公遺址久蕪廢公竭已資得之因浚池築室手植花竹靚深欝茂魚鳥翔泳如在林壑居成延高人勝士講誦觴詠日以為常篤於教子家事不以經意清溪江公宣慰浙東廉介不妄交聞君之賢為書齋扁以輔其志元統二年四月乙丑以疾卒於正寢卒之日其兄哭之曰孰敦手足之愛宗族鄉黨曰孰恤吾急士之往來者曰孰與遊而久益敬生於至元十四年六月癸酉年五十有八娶俞氏克以道相其夫内外無間言子男七可明可伯可與可觀可行可元可端可觀為兄溢後女二幸憐孫男仁翁孫女順改迴保遺命葬勿逺父墓得卜於鄞縣清道鄉清灣之原在父墓左一百一十步可明可伯持家教撫㓜弟能繼其志余辱君與遊宜銘銘曰濯清追凉釣遊鯉有志舉知慕公理去幹就彧異終始出者難工古皆是逍遥一世此其軌心迹不違誰與比祭文祭友仁孫先生文乾剛坤柔五氣異性交合成物乃正性命氣有美惡有清有濁所以哲人不繼而作惟我孫子鍾厥粹清師教不煩巳見㓜齡密事葩藻出入馳騁六經百家畧見要領年既志學學韓先所一悟大道乃入鈎矩其窮理也先後有節熟玩潛思隨物精察辯如懸河索如捕盜如衡之平如鑑之照其存養也敬以直内遽色疾言不少形外頭直氣肅手恭履遲造次必戒動静弗違其克治也改過不貳酒色貨利先絶言議乃克厥微誠之於思視聴言動惟禮是依其遊藝也禮樂書數天文地理文物制度下逮詩騷韓歐所述醫卜小道亦入其室愛敬二親隨事先意婉容愉色柔聲下氣洞洞屬屬捧盈持玉疾藥必躬過諫必熟居後母䘮家貧父存勉往教授以給清温旦具枕席夜易苫塊潛服三年聞者驚愾友愛厥弟怡怡而教有勞必分有拂弗較弟之庶母敬如已出彼亦允若乃睦一室處族必尊事長必敬待下必慈見孤必矜友必以信切切而勉鄰必温恭無貴若賤業未及竟志未及施胡不百年命止於斯順存正斃全受而歸子之所安後生孰師智者過狂守者過狷矜文少質任俠多變中行如子實我未見昔與子交晚事師禮遽焉予棄有憤誰啓酌酒陳辭孰究予懷天地茫茫予將疇歸祭外甥文嗚呼為人父母孰不願男女之有家室昌熾盛大為百世之傳哉子之賢良弱女是托謂宜偕老以成厥家何期蚤年相繼夭折前乖父母之望後缺子嗣之承豈子夫婦壽命之不長實我骨肉分薄之所致生不得以遂其愛死不得以視其終顧予何人尚在斯世嗚呼宗器河陽之役間闗萬里此情何時而忘耶嗚呼媛媛吾不得而見女矣吾之期女也逺故視女如棄不如女之望我也恒在於目前自今觀之女歸寧而送我之日是乃訣别終天之年嗚呼吾實負女而又何言耶吾與女母俱老矣吾將去此而歸女而無知吾徒抱恨而已如有知也尚當見女於黄泉嗚呼哀哉尚饗
