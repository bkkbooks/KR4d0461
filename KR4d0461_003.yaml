body:
  text: 畏齋集卷三元程端禮撰序孫先生詩集序古詩三百豈皆聖賢之筆哉庸夫匹婦之辭往往雜出乎其間然更千百年莫有過焉者豈非以其本乎情而得其自然之妙哉夫古人之心易直而質確故其形於言也簡淡而和平忠厚而慮深故其寓夫意也婉娩而悠長不求其工而發乎情之不得已是以命辭不勞而自成不思而自得嗟嘆淫佚而諷詠之際善者有以興起善心惡者有以懲創逸志故自天子至於庶人必用之而不可缺也孔子曰興於詩又曰邇之事父逺之事君蓋有賴焉後世之詩辭非不正也旨非不深也趣非不逺也率不過剽竊陳言綴緝綺語以誇一時而覬後譽甚至擁被而卧三年而得一聯者窮畢世之力而遂為無用之物言愈多而眩目事愈繁而惑心邵子所謂刪後無詩者信哉愚嘗究其末流之弊以為詩一變而為騷再變而為五言五言變七言其後又變而為律琢而為詞故詩至七言而衰律而壞詞而絶矣何則騷作於屈子雖其憂幽憤怨有戾中和然皆出於懇惻之誠五言有梁昭明選雖其出處不精薰蕕雜植猶平易而近古若七言則或馳驟放肆或刻巧不醇以至乎詞則輕浮淺薄華靡淫蕩不惟無用又有以鑿人之性故曰詩之絶也然五言之近於古者自淵明迄於李杜而已以韓歐蘇黃之雄才尚不離今人語况其餘哉夫以文華之士所尚如此而詩體之變壞又如此宜其愈工而愈無詩歟蓋千餘年朱子既出而古詩之遺意復見朱子之學不在乎詩故其作有自然之妙諷詠勸懲之實自朱子沒幾百年而後有孫子焉其學推周程張朱以接乎孟子自明而進乎誠由孝弟以盡其性主乎敬以求至不愧不怍之地是以其詩從容不迫庶幾朱子之風焉某後孫子六年交而後師之講誦餘力以詩自娛猶懼玩物而喪志也作詩見諷愚以是益信孫子非求工於詩者其發於性者歟其有用於世者歟觀者非可以言語求矣孫子名叔會字友仁年三十二道士吳友雲集序余少嗜學詩不得法或曰當如優孟學孫叔敖衣冠抵掌談語皆叔敖可也即取名家詩晝夜讀之句擬字摹以求其似如是者數年非獨自喜以為得或者亦謬許之矣先生長者見之曰噫是三年刻楮之智不亦固乎古人一家篇句聲韻風度老少自不能似謝不似陶杜不似李建安大厯元和諸家各不相似今愈求其似將愈不似縱悉似焉還之古人則子無詩矣能名家乎余爽然自失曰然則奈何曰學詩如學仙時至則自化在為之不已焉耳余念儒者之學有大於詩者千萬烏能畢世為是以俟其化故棄之三十年不作一語甬東吳友雲隱老氏學靈仙飛化之術為詩外百事而得以專故詩之化視其學昔與余同時學詩詩過余十倍者近十年間又悉以科舉廢惜不得觀其成今友雲天獨厚其嗜俾得專且久以俟他日使人讀之如聞鈞天廣樂九奏萬舞者必友雲之詩也夫喜雨詩卷序至正元年四月不雨溝澮揚塵田疇坼兆苖之已蒔立稿未蒔失時四明郡守王公宿齋戒躬率僚屬致禱於神即日昭格隂雲四合雷雨大作稿苖勃興郡人歌舞咸曰有秋之望由公之賜又曰公之蒞政方六越月以公亷為本而懷愷弟之政春仲時勸農首興水利嚴瀦泄之備先是颶風歲飢公既為萬民請濟即捐俸勸分續食凡為民利知無不為是所謂先成民而後致力于神者矣宜其有禱即應捷於桴鼓也余曰是固然矣而猶未究感通之所以然也蓋中和位育天人無二理况郡守實古諸侯有千里人民社稷之重寄一念之興上通于天果能致一身之中其力之所至自足以致封內之位育他人昧焉而公能知之故其功效卓卓如此也咸曰然學校之士為歌詩以志喜慶元鄉飲小録序唐虞本孝弟以成雍熙之治養老于庠其禮已肇至周飲射讀法以周公之聖制作大備遭秦焚滅天牖我民鄉飲酒禮得存於儀禮十七篇之中漢晉唐咸知舉行于郡縣蓋以道德齊禮莫重于斯廢墜之久在宋淳化間四明獨能行之朝廷取布之天下紹興以後賢守相繼訂禮益精且立恆産以供經費風俗之美文獻之盛遂甲他郡舊録可稽也今廢又七十九年矣歲首僅存會拜苟簡徇俗寖失經意乾沒租入太守蠡吾王公元恭之至敦教化移文咨禮爰以至正二年正月行之郡庠會者近千人齒德先後之有序獻酬揖讓之有儀鹿鳴魚麗關雎鵲巢之合奏間歌衎衎秩秩樂備禮成莫不感動歎嗟以為自有耳目未之見聞歸以相語孝弟之心油然而生嗚呼孔子曰吾觀于鄉而知王道之易易記曰鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁王公可謂知為政之本矣余之固陋幸得與行事之末敬序小録之首云江浙進士鄉會小録序至正十一年春天下鄉貢進士雲會于京師羣試于禮部于時江浙行省與計偕者四十有三人前舉二人由胄監者六人既試江浙之仕于朝及客于京師者相率持金錢具牢醴張國西門內咸宜里之榮春堂以燕勞之喜國家之得賢樂郡縣之多士敦契好昭斯文也乃二月九日春和景明道無流塵襜衣峩冠車馬闐咽主賔升堂揖讓有禮斑白在上俊彥就列杯行樂作氣酣情孚服軒冕者不以崇尚自矜被韋布者能以德義相尚雍雍愈愈懇欵深厚有古鄉飲酒之遺風焉及暮而退皆曰我國家設科以來聲教洽海宇江浙一省應詔而起者歲不下三四千人得貢于禮部者四十三人而已出於三四千人之中而立乎四十三人之列雖其知能得失有不偶然蓋亦難矣唯其難也故喜之喜之故樂之接之以情辭合之以饗禮期之以爵祿望之以勳庸是豈閭里之榮抑亦邦家之光也哉斯會也不可以無紀乃悉敘時人姓名字邑于編以為江浙進士鄉會小録燕臺嘯詠序吳君仲雄之始來京師居佛寺中蕭然一室人未有知者偶作墨龍壁間風雲生于倏忽雷電興于白晝見者驚異以為真龍之窺室也于是京師之人盛傳吳君墨龍而吳君不自以為能也余聞其名久與四明倪子靜過之援琴為余鼓樵歌微聲清切泠泠乎太古之音淵乎其若思忽乎其若遺轉而為宫聲舂容而重遲則清都之操是已坐客大恱于是又知君之能鼓琴也余竊樂之請學焉君授豫忘機然豫蚤衰心手扞格雖成聲終莫能得其妙當是時京師之公卿大夫四方賔客與其貴遊子弟之造門者唯琴是聽不知其又能為詩也余一日于几上得小詩數首問而知為君之作求其餘則皆棄其稿矣蓋吳中士君子多工于詩君自視不如故漫不以經意殊不知詩本性情政不以雕琢組織靡麗為工乃所以為得也何可及哉因搜其稿得若干篇以示豫章塗叔良叔良稱其能既和其古詩十首又為手録一通題曰燕臺嘯詠以授之余為之序嗟夫人有一材一藝不自矜衒以求知于世者鮮矣况多能哉余與吳君遊三年未始知其能為詩則其所藴蓄有過于詩者余固不得而知也不得知則雖多才多藝亦何以知吳君哉使吳君得行道于時臨民而施政其不干譽以取名也審矣余故敘其詩而論之以告夫欲知吳君者吳君蘇之嘉定人名元英今襲父祖爵為海道千户云東巖王公集後序右東巖先生王公文集若干卷余為校正并以私篋得公詩五篇集中遺者補焉敘之曰大德四年春公宰廣德之建平余幸得備員邑庠凡其學道愛人之政得於目擊者為詳公于書無所不讀才識高明而剛正志操公亷而仁厚為政以洗寃澤物為先立教以明倫習禮為重先是户無定名田無定數令民粉壁自實就收草檢為册民不敢欺而賦役自此均察詞訟變易於吏手積年不決公判狀令自勾至則立剖庭無留訟獄為之空舉行開荒例勸民築濵湖地為墟田使貧民得耕以為己業遇旱絶淫祀之禱嚴社稷之祭有求必應兵卒放鷹牧馬鄉落小民被其橫斂無告公給官印業空簿付社長令凡有取於民事無大小必書一月一報兵卒見簿望風逺去民得以安雖古循吏之政不能過此耆舊咸謂邑宰之有實在人心者百二十年間得二人焉前有施公德懋後則公也士久習浮靡剽竊之文公諭令明經學道必宗朱子風俗丕變三十年間後進知讀書之法休沐之日領文雅好修之士泛郎溪登赤山飲酒賦詠動成卷軸畫詩書民間稱三絶得片紙持去傳以為寶嗟夫建平江左小邑赤山郎溪亦未嘗名聞四方蓋以公之流風餘韻藹然被兹邑去之三十年思之者深迹其舊故溪山之名亦得以著鄒湛所謂羊叔子之名當與峴山俱傳者是已公位不稱德而卒今其季子元戴居攬轡澄清之任繼洗寃澤物之志天之所以報之者豈必三槐之植而後驗哉某受公知愛最厚又辱與元戴讀書赤山精舍者有年俯仰之間已成今昔幸得復讀遺編不勝峴山之感豈惟公之儀型不可復見如某之得在當時為樽前之鄒湛者亦已老矣嗟夫寶林編後序寶林越之名剎也倚山而並湖雄跨一郡飛來峯上有塔數層高切雲漢逺覽江海神靈之迹詭異之觀照耀耳目四方之士莫不遊焉今御史府移治於越而主山僧講師别峯同公又有道德能文章好賔客故遊者滋衆去年冬余以王事過越望其塔心竊樂之不暇登也頃者屏迹江干師以扁舟邀余宿方丈會足有疾又不得登是塔窺鰻井嘯歌槃翠之軒以寓遊觀之目焉既而得師之弟子泰來所録寶林編者讀之則前之所願遊而不得者厯厯在目矣不徒見當時之盛又若親見古人輯杖屨而與之上也不徒覩文辭之富而佛氏之元機妙用深宏簡密載諸經律論疏者亦可得而略聞也故嘗以為天下之名山大川前王之宫先賢之宅不歸之佛氏則歸之老氏故二家得托以為重文人才子又相與鋪張而羽翼之其徒率多魁奇卓絶之士得有所藉以奮而道於是乎久傳亦理之宜無足怪者况許元度房次律之事不偶然乎余以越之山川雖不得一登覽為恨實喜寶林之有是編也故書之告夫欲遊而不得者觀是編如遊寶林焉至正戊戌二月之望張克寬義聚序昔者聖人制五服禮有親疏隆殺之節而其情則無窮也父而子子而孫孫而曾曾而元以至而仍而雲猶木之根幹枝葉一本耳然五世而服盡者非聖人恝然也以義割恩使人可繼云耳非人之情盡於服也聖人懼人之情盡於服也於是治大宗小宗之法以屬之自大宗小宗之法行而人知己之所自雖疏而親雖逺而近而風俗厚矣余助教國學伴讀張生克寬偕兄子汝遴從豫遊嘗詢其家世則曰緦服外猶同居共㸑餘百口無間言余矍然曰是知一本者歟知服有盡而情無窮者歟余聞培其根者枝益蕃厚其本者末益衍張氏之自厚如此吾知其發於二生也然余有規焉傳曰天之生物必因其材而篤焉栽者培傾者覆爾祖若父培之在上繼其志流其澤不在二子乎二子勉乎哉送宋主簿詩卷序泰定三年十一月二十五日吉安朱元禮主江寧簿得代且行大夫士出餞為歌詩頌公之美謂余曰江寧號難治公之來縣長以贓敗令望風解印去公獨立守益堅政益舉威行愛孚縣以治稱余曰子未知公建平之政也延祐間公以儒試吏尉建平以己之不欲弭盜民間外户幾不閉既盡職又能盡言以佐其令朱仁父而歸美焉仁父用其言以亷明稱此余所見者先儒謂簿若能以事父兄之道事令善則惟恐不歸於令豈有不得人者觀公建平之政有焉余於是不特知其能為簿且知其能為令也其為尉能盡職不必言也其能進盡言於江寧令長可知也使用其言可不敗也昔王尊為益州刺史叱馭行九折坂守東郡河決隄壞吏民奔走惟一主簿在尊旁立不動觀公江寧之政有焉余於是不特知其能為令且知能為守能為刺史也其為簿能自保不必言也今世見章句儒無以勝文法吏也類曰儒者不可任俗壞不可化州縣參佐不可為噫公非以儒者為參佐官於難治之縣者邪故余喜道其事因書詩卷後送烏爾圗赴慈溪尉詩卷序唐選舉志李德裕謂朝廷顯官須公卿子弟為之少習其業目熟其事臺閣之儀不教而自成寒士縱有出人之材固不能嫺習也史謂其言為偏異余謂非偏異也言有未盡焉耳公卿子弟第當問其才不才如何使其不才雖小官不用豈敢比寒士果才也思其祖父勤勞國家以著勳烈必能繼述濟美以振家聲用之顯官且將為伊陟君陳也豈特習其業熟其事嫺其儀而已此則豈寒士可比哉余每歎德裕之言有所未盡者以此也烏爾圗自其曾大父大父事世祖皇帝汛掃六合戰勝攻取功在國史本兵柄於朝廷任風憲於湖南江西聲猷風節凛然今君承三世之傳耳濡目染前徽未泯所謂習其業熟其事嫺其儀者歟今之尉慈溪也以繼濟美而振其家聲者不始兹乎鄞士與之遊而知其才者咸以是望之也行之日詠歌其志以餞俾余為之序送建平頓縣尉任滿詩卷序清平頓謙父尉建平秩滿得代邑大夫士出餞詩以頌之咸曰公為政以不欲弭盜田里底寧廉介之節三歲克終去為邑民惜程某諗於衆曰公非欲以一節自表見者以廉介稱公末也余家浙東知公為詳初至元間更各道提刑按察使為肅政廉訪使公贊浙東海右道幕一時觀聽之聳選任之隆用事者以遇事風生為能獨公貞確沉毅不徇不激以忠厚服一府公今之廉介猶前之忠厚也以風憲中不皆如公故前得忠厚之名以州縣間不皆如公故今得廉介之名公何有於是第知守其所以為公而已昔魏徐景山時方變易車服以求清素之名人稱其通其後相效奢靡又以介稱之今稱公者其類是歟夫君子志一而行獨量宏而用周固未嘗標一節以釣名為賈人人棄我取事且矯情者可暫又烏能有所三年終也聲大者器宏公前後所至咸著名實豈非志一而量宏者有以本之歟倘位高及廣其稱於人者又豈止是衆曰然子書其辭為送行詩卷序余不得以不文讓送巡鹽萬户郝公序古昔天子六卿帥六軍諸侯三卿帥三軍孔子相魯君會文事必武備魯與齊戰冉有用矛樊遲為右蓋士自小學學射御舞勺象而文武兼詩書禮樂所以造士所以謀師非若後世兵農分官不相能弊至於不相恤也鎮平江十字翼萬户郝侯自其曾大父元帥公從太祖皇帝定河南大父襄靖公平江南父明威公紹持武節鎮吳侯席纍世勳業太平日久讀書力學凡窮理盡性修已治人之要討論砥礪如醇儒宜其治法征謀無施不可其調發嚴紀律明賞罰士卒不譁桑果下無一迹嫓古名將奉檄察鹽禁至浙東善彰惡疸威畏惠孚所至成績未易悉紀今夏復蒞四明名實益昭郡八德之適行鄉飲酒禮侯為僎揖讓升降動容周旋皆中儀則禮成樂備觀感恱服侯之還也士為歌詩以送而余為之序送劉謙父海運所得代序周以冡宰制國用洪範八政先貨古之制也自陳平謂錢穀非宰相所職後世遂以理財為恥王介父輔其君行堯舜之道政首理財至與爭者相詆訾介父曰諸公坐不讀書爭者曰臯夔稷契所讀何書且法始伏羲而成乎堯孔子定書斷自唐虞謂其讀何書不亦誣乎程伯子首為介父三司條例司以至誠開納不合也然後去之語介父曰公之談道正如對塔説相輪如某則直入塔中上尋相輪而坐其中者此言深中介父誤國之病然則讀書必若程子而後可定安劉謙父來官慶紹海運所轉粟數百萬斛給京師放舟萬里驚濤駭浪中為之三年無圭撮弗以時達昔劉晏竭其心思而能之者公為之易易然也去年秋得代邀余同遊鄞之湖山間踰二旬舟中聽其劇論古今得失上下數千載貫穿精核如昨日事蓋其讀書以本之者乃如此也孔子曰誦詩三百授之以政不達雖多亦奚以為如公讀書不謂之達不可也他日位內外服將咸宜之不特理財也鄞士之知公者為詩以送之余因托其論於舟中者為之序送任懷可赴鉛山務官序任君懷可先大夫次山公故宋寶祐間與先人同中進士舉公擢第方揚厯而宋內附時鄉郡守臣實宋宗姓危疑之際公能左右之俾決應天順人之舉脫一郡生聚於鋒鏑公時倅郡即退休讀書教子鄉人所取法先人見懷可學日進歸即以之訓飭不肖兄弟且言活千人者必封今次山豈止活千人而已其子又能力學任氏之興也必矣兩家憂患之餘懷可從蔭調四為遊徼於海濵而余亦走四方以幸斗食别去逾三年今秋懷可訪余驚余之衰病余視懷可雖胸中之浩然者不衰而鬚鬢白矣相視憮然者久之曰今征商鉛山與子别余謂委吏聖人所盡心管庫士趙文子舉為大夫自後世君子恥理財而民益困懷可之盡心所職豈俟余言今世豈無文子者懷可艱而後通抑在此行也歟懷可有子又能力學守家法任氏之興不在懷可則在其子也歟送趙恱道經厯致仕歸序仕未七十而謝事高節也得謝而歸樂自漢二疏至宋范歐厯厯輝映史册夫人知慕也往往不自決至貽不去之譏昔朱子發問出處之宜胡康侯曰出處不宜問人且非人所能決旨哉言也信都趙公恱道以高材厚德讀書學古仕州郡風憲所至可紀前年來經厯宣慰元帥府於浙東方以精練望一府年六十六一旦謝事去噫公之高節配古人豈非出處決於平日之素者為之歟且公能教其二子皆以文學行誼名長已賜同進士受泰州判官乃以父蔭官讓其弟一門詩禮之澤藹如也然則公之歸遂其野服杖履水竹阡陌故人遊飲之樂凡得謝者所同也若夫老而傳傳而樂有子此又公之所獨得者歟鄞士能詩者詠歌其事而余敘於卷首云送張縣尹致仕序禮稱七十致仕蓋以人之氣血既衰可以告老而為吾休息之計不過就其人所自處者而論之耳而後世因之以為例凡登兹年者息不為世用夫當齒德俱尊之時正有以決大疑定大謀而例去之則無老成人矣故國朝惟翰林集賢與它官之精力未衰者不在致仕限良有以也然翰林集賢既非勳舊人不得與而所謂精力未衰者或非盡恬退之人至有諱其年而苟祿者焉大丈夫與廉恥俱生廉恥既虧何以事上治民哉博平仁甫張君之尹鄞也務寬厚去矯偽吏民安之邑邇浙閫庶務繁劇君應之無倦色言談舉止若壯年在邑二年而以致仕告人愕然曰張君精力如此而引年甚力其廉恥重而自處厚歟古之人雖老而不忘其君然其進退之際必以其道苟知進而不知退正吾所謂無恥人也其自處厚者非薄於其君也惟如此然後可以事君云耳然則張君其庶乎彼諱年苟祿之徒聞君之風能無少愧乎於其行大夫士咸詩之余亦書其得於自處者於卷首送衛縣尉致仕序吾觀韓退之上表論孔戣致仕以為朝廷故事年雖八九十但視聽心慮苟未昏錯雖求退罷無不殷勤留止以明尊賢敬老之道以當時許孔戣之去為非又觀其送楊巨源序以為中世士大夫官罷則無所於歸巨源能年滿七十白丞相去又為攀援二疏事以夸美之然則致仕乃人臣之節留之國家之禮也自後世有昏耄誤事貪之不止故有致仕之條是固其待之之薄亦其有以致之也方今承平日久資給一定士雖一命無遽得者使進取少遲至為簿尉之日則已白首入仕既與古異似未易以致仕律之今人且禮七十致仕止曰大夫亦未嘗曰士也建平尉涿郡衛公正父蒞事期年政平盜息邑人方利賴之一旦上章告老解印綬去咸謂吾見仕吾邑者自非贓汚罷去雖耄甚無不三年終者如公之去三十年間未之或聞莫不嘆美驚唶邑長老迭進留公曰致仕雖漢唐以來人臣偉節如二疏孔揚輩皆早歲入仕久為大夫於朝或以先見或以知止得謝而去朝廷為之賜金且祿之終其身今公自巡檢調兹任辛勤之久始得一命年雖及而精力尚強家之仰食者近二百指貧無以為田園資似未宜忘祿而決然去也公笑不答將行邑士效送巨源故事為歌詩以頌而某為之序送奉化吏目陸千里序余友朱景陸來述雲屋孫千里之言曰驥幼讀書急親養不得守先業由刀筆吏以進積月日今將吏目奉化惟是不學無以事大夫之賢贊循吏之治是懼我祖之交程先生幸歸里願為我請焉求一言俾得以自朂敢為之請余謂雲屋陸君讀書弗遇以其才思一寓於詩其苦吟深入詩人畛域能與秋巖葛君齊名其遊婺也余嘗以詩送之今又見其孫之仕俯仰四十年為之感歎老矣無能何言之贈且仕顧所行何如耳千里以入仕由刀筆自愧則惑之甚矣周官府史與下士同祿取士多塗振古如兹漢尹翁歸王尊起獄小吏朱邑鮑宣起嗇夫趙廣漢龔勝起郡吏其功業照映史册去之千載使人歆慕在於以治得民而已奚入仕之足云此古人也請又以今之人為衆所共知者明之吾鄉大嵩里有黃良輔者起刀筆前年都目溧水廉公有威州民恃之如親父母逺近上下稱之日所行州事夜必一一乎手記露香告天所服焚香之衣百衲閲四十年近七十或勸之曰宜少取為田園資不答余留金陵所親見者其髙風苦節無愧古人是皆足以為千里法矣景陸曰唯唯送薛學正歸永嘉序余至元間教鉛學友人祝志道歸自獨峯為余言學官之盡心職業者曰永嘉薛君在心其録括學缺長官講學勸誘以新士習廟學隘且壞拓而隆之學田十餘頃沒於浮屠氏訟而復之米廪充而藏修遊息者益衆士論歸焉明年志道又歸言在心今正明學往來者言其盡心如在括時余謂志道之言可信而未之能詳也又明年冬豫還明未抵舍在心已銜太守王侯命邀余入學詢之則知其於吾鄉文學行義之士無不納交惟恐或遺且未嘗以問學自髙王侯興學革積弊以求教養之實其贊助居多有司合浙東七學之力刋鄉先生玉海書若干卷二年而成日嚴程督備殫心力此余之得於所親見者始於志道之言益信矣余謂士之談詩書而略事功其來已久遂使俗吏嗤儒為不足用觀在心少試學校為人之佐已如此使為世用得行其志效當何如哉余少讀薛常州行述竊欣慕之蓋其學本濂洛其自得之實於經無不合於事無不可行蒞官文武應機處變政無巨細靡不曲當雖董子之名田諸葛之治軍殆無以易其僚屬不知其為儒者在心實常州之徒宜其不昧於前徽今代且行明士為歌詩以餞而余序於卷首云送集慶學正梅仲蕃秩滿歸廣德序仲蕃從祖大卿艮巖公當宋寶祐間教鄞學諸生經術文章經其口講指畫皆為名士余大父與為石交先人時在襟佩列大德間余來桐汭得交仲蕃父味道與其伯仁父兄君錫日以讀書講學親師取友為急務如巴西鄧善之眉山劉至善盧山曹士𢎞一時萃桐汭武林仲蕃與其兄弟皆往來受業於門後十年余歸鄞仲蕃正鄞學鄞之子弟曰是吾父兄之師之孫也以其愛敬艮巖公者愛敬焉後余來升仲蕃正升學缺正官主學事教養是力絃誦日興風紀所臨素號難為翕然譽處交章薦之今之得代也升士惜其去為歌詩以餞余謂仲蕃之宜於其職升士所知也其學術宦業之得於家世與其師友者未若余之知仲蕃之悉也故為序於詩卷後送浙東元帥府阮照磨序宛陵阮君受益世仕鄞余獲交相知為深其父奉政公泰定間宰鄞為受益擇師得東發黃先生子彥實彥實與余同歸果齋史先生兩先生皆得朱子門人正傳觀奉政之所以擇師彥實之所以教受益之所以學可謂至矣時鄞之諸老尚多見受益造詣莫不驚嘆許其他日為名進士雖奉政亦奇其能繼乃祖祕書公世科也受益又親見奉政六年撫字所以興利除害彰善疸惡夜思晝行如古循吏效始及物益悟朱子理不外事而事無非學之訓非虛誥於是究觀數千年治道得失士大夫行已大節謂余曰擇善未精而固執以自誤昔之大賢且不免吾敢自是乎哉尋丁父憂服闋又曰科第世所榮也取士以言吾豈能必有司之好惡乃以父任調浙東帥府照磨事簡益得以學今代去猶歉然不敢自恃為進取計凡知受益者益賢之矧余之辱交最深者哉昔楊次公於叔明兄弟以文學知名皆以父任為京官不得進由科第終有不釋然者王介父至作進説近千言解之余於是歎受益之能自悟學力過叔明逺甚介父進説謂今無古者教養選舉之法故士勢不得不自進雖孔子猶為季氏吏謂叔明有得已之勢而不自己未見其為得余深有味乎其言然介父為叔明謀則得矣又嘆介父以堯舜其君自任得君專且久乃務財用進小人為桑孔事與一朝君子力爭自以為行周官法度者何歟豈惟介父歐陽公之濮議蘇公之南北郊司馬公之役法所謂擇善未精固執以自誤者非歟故君子大居敬而貴窮理噫漆雕開可仕猶曰吾斯之未能信受益有焉此非志於道德不能知也受益行有日故余敘其嘗以警余者送之因以勉焉送田推官代歸序保定田侯思溫之為四明推官也惟資忠厚勤以行已和以待人凡獄州縣以成案上郡侯惟理是親必反覆詳審以求其寃平反者不知其幾既得其情又必求情法輕重之當而後決一歸美於長二僚屬而不自專長二僚屬見或未一懇懇言之不直不止言益和而無忤色為之八年欽恤之誠心如一日政平訟理盜賊屏息民得樂生於田里故戴侯如父母嗚呼為政之難莫難於治獄治獄之難莫難於欽恤誠心之持久吾見世之蒞官一二年平反一二事樹名聲者多矣能三年有終者固難能持久於八年者尤難也吾見用其獨見審克寃獄與長二僚屬至於相忤者多矣至若事求情法之當委曲周盡而不失和氣者尤難也侯之在職餘七年無代至謝病去今其再求受代也明之士民逺近迎勞歡欣鼓舞依依戀戀敬愛益篤耄倪遮道萬口稱頌然則侯之得民豈偶然乎哉或者謂鄞人器小而俗薄今觀其能不忘田侯之德若此俗果薄乎哉書曰昔司冦蘇公式敬爾由獄用長我王國田侯有焉易曰有孚惠我德明人有焉士歌詩以餞而余為之序送鉛山州判官吳大任代歸序余泰定間得交大任於金陵其受學草廬吳公門為髙弟余弟時叔歸自國學才美以大任為稱首尋以春秋試入髙等調鉛山州判官至元三年八月余來教授州後大任四月士民相與語某理得直某寃得洗某事得無擾無取盜賊偽鈔得不為境內害皆曰賴吳公賴吳公云時州長楚什勒特穆爾公守茂先李公能聽大任二年間善政籍籍播逺邇臺憲稱之二公相繼代去自是事不廷議政日以龎大任爭不聽方謝病杜門適省檄往浙右核倉儲還則代者至矣故州人之德大任尤深今其行也祖帳滿道耄倪攀戀至不能别余謂今世豈無岑范以倅成之不常有也使守長能盡聽大任大任盡行所知治效又豈止此余方致事歸老海濵尚能見大任膴仕得專達事業追配古人慰衰暮之望也
